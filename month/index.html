<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Calendar - LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <style>
    .device-warning {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      box-shadow: var(--glow);
    }
  </style>
</head>
<body class="calendarPage">
  
  <div class="pageContainer">
    <h2>Monthly Calendar</h2>
    <div id="deviceWarning" class="device-warning">
      <h3>Please rotate your device or load on a larger screen</h3>
      <p>The calendar requires a wider screen to display properly.</p>
    </div>
    <div id="calendarContainer">
      <div class="calendar-nav">
        <button type="button" id="prevMonth"><img class="sf-symbol-icon" src="/icons/src/arrow.backward.svg" alt="" aria-hidden="true">Previous</button>
        <h3 id="currentMonthYear"></h3>
        <button type="button" id="nextMonth">Next<img class="sf-symbol-icon month-forward-icon" src="/icons/src/arrow.backward.svg" alt="" aria-hidden="true"></button>
      </div>
      <div class="calendar-key">
        <h3>Key/Legend</h3>
        <ul>
          <li><span class="key-box holiday"></span> Holiday</li>
          <li><span class="key-box half-day"></span> Half Day</li>
          <li><span class="key-box special-schedule"></span> Special Schedule</li>
          <li><span class="key-box today"></span> Today</li>
        </ul>
      </div>
    </div>
  </div>
  <!-- calendar grid sits directly on the page now and outside pageContainer -->
  <div class="calendar-grid" id="calendarGrid"></div>
  <script src="/common-core.js"></script>
  <script>
    (async () => {
      if (typeof window.loadCommon === 'function') {
        try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
      }
      await initApp();
      renderCalendar();
      document.getElementById('prevMonth').addEventListener('click', () => changeMonth(-1));
      document.getElementById('nextMonth').addEventListener('click', () => changeMonth(1));
    })();
  </script>
</body>
</html>
