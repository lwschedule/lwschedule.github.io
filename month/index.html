<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Calendar - LW Schedule</title>
  <link rel="preconnect" href="https:
  <link rel="preconnect" href="https:
  <link href="https:
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3c2569">
  <link rel="stylesheet" href="/common.css">
</head>
<body class="calendarPage">
  <a href="/" class="backBtn">← Back</a>
  <div class="pageContainer">
    <h2>Monthly Calendar</h2>
    <div id="deviceWarning" style="display: none; text-align: center; padding: 40px 20px; color: white;">
      <h3>Please rotate your device or load on a larger screen</h3>
      <p>The calendar requires a wider screen to display properly.</p>
    </div>
    <div id="calendarContainer">
      <div class="calendar-nav">
        <button type="button" id="prevMonth">← Previous</button>
        <h3 id="currentMonthYear"></h3>
        <button type="button" id="nextMonth">Next →</button>
      </div>
      <div class="calendar-key">
        <h3>Key/Legend</h3>
        <ul>
          <li><span class="key-box holiday"></span> Holiday</li>
          <li><span class="key-box half-day"></span> Half Day</li>
          <li><span class="key-box special-schedule"></span> Special Schedule</li>
          <li><span class="key-box today"></span> Today</li>
        </ul>
      </div>
    </div>
  </div>
  <!-- calendar grid sits directly on the page now and outside pageContainer -->
  <div class="calendar-grid" id="calendarGrid"></div>
  <script src="/common.js"></script>
  <script>
    (async () => {
      await initApp();
      renderCalendar();
      document.getElementById('prevMonth').addEventListener('click', () => changeMonth(-1));
      document.getElementById('nextMonth').addEventListener('click', () => changeMonth(1));
    })();
  </script>
</body>
</html>
