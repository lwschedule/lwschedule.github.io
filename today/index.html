<body>
  
  <div class="pageContainer">
    <h2>Today's Schedule</h2>
    <div id="todayContent">
      <p>Loading schedule...</p>
    </div>
  </div>
  <script src="/common.js"></script>
  <script>
    (async () => {
      await initApp();
      updateTodaySchedule();
      updateClock();
      setInterval(updateClock, 1000);

      
      let currentDay = new Date().getDate();
      setInterval(() => {
        const now = new Date();
        if (now.getDate() !== currentDay) {
          currentDay = now.getDate();
          updateTodaySchedule();
        }
      }, 60000);
    })();
  </script>
