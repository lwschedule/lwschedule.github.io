<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upcoming Events - LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3c2569">
  <link rel="stylesheet" href="/common.css">
  <style>
    .eventsList {
      width: 100%;
    }

    .eventsKey {
      margin-bottom: 14px;
    }

    .key-box.events-test {
      background: var(--primary-light);
    }

    .eventsDay {
      border-top: 1px solid #3a3a3a;
      padding-top: 16px;
      margin-top: 14px;
    }

    .eventsDay:first-child {
      margin-top: 4px;
    }

    .eventsDayHeader {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .eventsDayTitle {
      margin: 0;
      text-align: left;
      font-size: 1.08em;
      font-weight: 700;
      color: white;
    }

    .eventsDayCount {
      font-size: 0.82em;
      color: #cfcfcf;
      opacity: 0.8;
      white-space: nowrap;
    }

    .eventCard {
      position: relative;
      border-radius: 16px;
      padding: 14px 16px 14px 20px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
    }

    .eventCard::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 10px;
      bottom: 10px;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--primary-light), var(--primary));
    }

    .eventCard:last-child {
      margin-bottom: 0;
    }

    .eventCard-standardized,
    .eventCard-ap,
    .eventCard-default {
      background: rgba(255, 255, 255, 0.07);
    }

    .eventTitle {
      font-size: 1.02em;
      font-weight: 700;
      color: white;
      line-height: 1.3;
      margin: 0 0 6px;
    }

    .noEvents {
      margin-top: 16px;
      text-align: center;
      background: #181818;
      border-radius: 12px;
      padding: 26px 18px;
      border: 1px solid #303030;
    }

    .noEvents h3 {
      margin: 0 0 10px;
      font-size: 1.25em;
    }

    .noEvents p {
      margin: 0;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .eventsDayHeader {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .eventCard {
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <a href="/" class="backBtn">← Back</a>
  <div class="pageContainer">
    <h2>Upcoming Events</h2>
    <div class="calendar-key eventsKey">
      <h3>Key/Legend</h3>
      <ul>
        <li><span class="key-box events-test"></span> Test</li>
      </ul>
    </div>
    <div id="eventsList" class="eventsList">
      <p>Loading upcoming events...</p>
    </div>
  </div>

  <script src="/common.js"></script>
  <script>
    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function parseLocalDate(dateString) {
      if (typeof dateString !== 'string') return null;
      const parts = dateString.split('-').map(Number);
      if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function getEventCardClass(type) {
      if (type === 'standardized-test') return 'eventCard-standardized';
      if (type === 'ap-test') return 'eventCard-ap';
      return 'eventCard-default';
    }

    function formatEventTitle(title) {
      const normalized = typeof title === 'string' ? title.trim() : '';
      if (!normalized) return 'Untitled Test';
      if (/(test|testing|exam)\b/i.test(normalized)) return normalized;
      return `${normalized} Test`;
    }

    function renderNoEventsMessage() {
      const listEl = document.getElementById('eventsList');
      if (!listEl) return;
      listEl.innerHTML = '<div class="noEvents"><h3>No Upcoming Events</h3><p>Check back later for newly added events.</p></div>';
    }

    function renderUpcomingEvents(rawEvents) {
      const listEl = document.getElementById('eventsList');
      if (!listEl) return;

      if (!Array.isArray(rawEvents) || rawEvents.length === 0) {
        renderNoEventsMessage();
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const upcomingEvents = rawEvents
        .map((eventItem) => ({
          ...eventItem,
          dateObj: parseLocalDate(eventItem.date)
        }))
        .filter((eventItem) => eventItem.dateObj && eventItem.dateObj >= today)
        .sort((a, b) => {
          const dateDiff = a.dateObj.getTime() - b.dateObj.getTime();
          if (dateDiff !== 0) return dateDiff;
          return (a.title || '').localeCompare(b.title || '');
        });

      if (!upcomingEvents.length) {
        renderNoEventsMessage();
        return;
      }

      const grouped = new Map();
      upcomingEvents.forEach((eventItem) => {
        const key = eventItem.date;
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(eventItem);
      });

      let html = '';
      grouped.forEach((dayEvents) => {
        const dayDate = dayEvents[0].dateObj;
        const dayLabel = dayDate.toLocaleDateString('en-US', {
          weekday: 'long',
          month: 'short',
          day: 'numeric'
        });

        html += `<section class="eventsDay">
          <div class="eventsDayHeader">
            <h3 class="eventsDayTitle">${escapeHtml(dayLabel)}</h3>
            <span class="eventsDayCount">${dayEvents.length} test${dayEvents.length === 1 ? '' : 's'}</span>
          </div>`;

        dayEvents.forEach((eventItem) => {
          const cardClass = getEventCardClass(eventItem.type);
          html += `<article class="eventCard ${cardClass}">
            <p class="eventTitle">${escapeHtml(formatEventTitle(eventItem.title))}</p>
          </article>`;
        });

        html += '</section>';
      });

      listEl.innerHTML = html;
    }

    async function loadEventsPage() {
      try {
        const response = await fetch('/data/events.json');
        if (!response.ok) throw new Error('Failed to load events');
        const data = await response.json();

        const standardizedTests = Array.isArray(data.standardizedTests)
          ? data.standardizedTests.map((eventItem) => ({ ...eventItem, type: 'standardized-test' }))
          : [];

        const apTests = Array.isArray(data.apTests)
          ? data.apTests.map((eventItem) => ({ ...eventItem, type: 'ap-test' }))
          : [];

        renderUpcomingEvents([...standardizedTests, ...apTests]);
      } catch (error) {
        console.error('Events page load error:', error);
        renderNoEventsMessage();
      }
    }

    (async () => {
      await initApp();
      await loadEventsPage();
    })();
  </script>
</body>
</html>
