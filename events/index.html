<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upcoming Events - LW Schedule</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <script src="/loader.js"></script>
  <style>
    .eventsList {
      width: 100%;
    }

    .eventsKey {
      margin-bottom: 14px;
    }

    .eventsDay {
      border-top: 1px solid #3a3a3a;
      padding-top: 16px;
      margin-top: 14px;
    }

    .eventsDay:first-child {
      margin-top: 4px;
    }

    .eventsDayHeader {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .eventsDayTitle {
      margin: 0;
      text-align: left;
      font-size: 1.08em;
      font-weight: 700;
      color: white;
    }

    .eventsDayCount {
      font-size: 0.82em;
      color: #cfcfcf;
      opacity: 0.8;
      white-space: nowrap;
    }

    .eventCard {
      --event-accent: var(--primary-light);
      position: relative;
      border-radius: 12px;
      padding: 14px 16px 14px 18px;
      margin-bottom: 10px;
      background: var(--event-accent);
      border: 1px solid color-mix(in srgb, var(--event-accent) 65%, black);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .eventCard::before {
      content: '';
      position: absolute;
      left: 6px;
      top: 0;
      bottom: 0;
      right: 0;
      border-radius: 0 12px 12px 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1;
    }

    .eventCard:last-child {
      margin-bottom: 0;
    }

    .eventTitle {
      position: relative;
      z-index: 2;
      font-size: 1.02em;
      font-weight: 700;
      color: white;
      line-height: 1.3;
      margin: 0 0 4px;
    }

    .eventTime {
      position: relative;
      z-index: 2;
      margin: 0;
      font-size: 0.78em;
      color: #e3e3e3;
      opacity: 0.88;
    }

    .noEvents {
      margin: 16px auto 0;
      text-align: center;
      background: var(--card-dark);
      border-radius: 12px;
      padding: 30px;
      max-width: 520px;
      color: var(--text-light);
    }

    .noEvents h3 {
      margin: 0 0 10px;
      font-size: 1.25em;
      opacity: 0.9;
    }

    .noEvents p {
      margin: 0;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      .eventsDayHeader {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .eventCard {
        border-radius: 10px;
      }

      .eventCard::before {
        border-radius: 0 10px 10px 0;
      }
    }
  </style>
</head>
<body>
  
  <div class="pageContainer">
    <h2>Upcoming Events</h2>
    <div class="calendar-key eventsKey" id="eventsKey" style="display:none;">
      <h3>Key/Legend</h3>
      <ul id="eventsKeyList"></ul>
    </div>

    <div id="eventsList" class="eventsList">
      <p>Loading upcoming events...</p>
    </div>
  </div>

  <script src="/common-core.js"></script>
  <script>
    let allEvents = [];

    // ---- Rainbow color system ----
    // Base rainbow colors in order, then lighter variations repeat
    const EVENT_COLORS = [
      // Base rainbow
      '#e53e3e', // red
      '#ed8936', // orange
      '#ecc94b', // yellow
      '#48bb78', // green
      '#4299e1', // blue
      '#9f7aea', // purple
      '#e2e8f0', // white
      // Lighter variations
      '#fc8181', // lighter red
      '#f6ad55', // lighter orange
      '#faf089', // lighter yellow
      '#9ae6b4', // lighter green
      '#7f9cf5', // lighter blue
      '#c4b5fd', // lighter purple
      '#ffffff', // lighter white
    ];

    // Map of event type -> css color hex
    let eventColorMap = {};
    let nextColorIndex = 0;

    function getEventColor(type) {
      if (!eventColorMap[type]) {
        eventColorMap[type] = EVENT_COLORS[nextColorIndex % EVENT_COLORS.length];
        nextColorIndex++;
      }
      return eventColorMap[type];
    }

    function getEventTypeLabel(type) {
      if (type === 'standardized-test') return 'Standardized Test';
      if (type === 'ap-test') return 'AP Testing';
      if (type === 'sports') return 'Sports';
      return type.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderEventKey(usedTypes) {
      const keyEl = document.getElementById('eventsKey');
      const listEl = document.getElementById('eventsKeyList');
      if (!keyEl || !listEl) return;

      if (!usedTypes.length) {
        keyEl.style.display = 'none';
        return;
      }

      keyEl.style.display = '';
      let html = '';
      usedTypes.forEach(type => {
        const color = getEventColor(type);
        const label = getEventTypeLabel(type);
        html += `<li><span class="key-box" style="background:${color};"></span> ${escapeHtml(label)}</li>`;
      });
      listEl.innerHTML = html;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function parseLocalDate(dateString) {
      if (typeof dateString !== 'string') return null;
      const parts = dateString.split('-').map(Number);
      if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function getEventCardStyle(type) {
      return '--event-accent:' + getEventColor(type) + ';';
    }

    function formatEventTitle(title, type) {
      const normalized = typeof title === 'string' ? title.trim() : '';
      if (type === 'sports') return normalized || 'Untitled Event';
      if (!normalized) return 'Untitled Test';

      if (/^AP Testing:/i.test(normalized)) return normalized;
      if (/^AP Test\/Portfolio Submission Due:/i.test(normalized)) return normalized;
      if (/^AP Performance Task Submission Due:/i.test(normalized)) return normalized;
      if (/^AP Portfolio Submission Due:/i.test(normalized)) return normalized;
      if (/^AP Late Testing:/i.test(normalized)) return normalized;

      if (/^AP\s+/i.test(normalized)) {
        const subject = normalized.replace(/^AP\s+/i, '').trim();
        return `AP Testing: ${subject}`;
      }

      if (/(test|testing|exam)\b/i.test(normalized)) return normalized;
      return `${normalized} Test`;
    }

    function formatEventTime(eventItem) {
      return typeof eventItem.time === 'string' ? eventItem.time.trim() : '';
    }

    function renderNoFollowedEvents() {
      const listEl = document.getElementById('eventsList');
      if (!listEl) return;
      listEl.innerHTML = '<div class="noEvents"><h3>No followed events coming up.</h3><p>Add events to follow in your <a href="/profile" style="color:white;">Profile</a>.</p></div>';
    }

    function getUniqueTypes(events) {
      const types = new Set();
      events.forEach(e => types.add(e.type));
      return [...types].sort();
    }

    function renderEvents(events) {
      const listEl = document.getElementById('eventsList');
      if (!listEl) return;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const upcoming = events
        .map((e) => ({ ...e, dateObj: parseLocalDate(e.date) }))
        .filter((e) => e.dateObj && e.dateObj >= today)
        .sort((a, b) => {
          const d = a.dateObj.getTime() - b.dateObj.getTime();
          if (d !== 0) return d;
          return (a.title || '').localeCompare(b.title || '');
        });

      if (!upcoming.length) {
        renderNoFollowedEvents();
        return;
      }

      const grouped = new Map();
      upcoming.forEach((e) => {
        const key = e.date;
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(e);
      });

      let html = '';
      grouped.forEach((dayEvents) => {
        const dayLabel = dayEvents[0].dateObj.toLocaleDateString('en-US', {
          weekday: 'long', month: 'short', day: 'numeric'
        });

        html += `<section class="eventsDay">
          <div class="eventsDayHeader">
            <h3 class="eventsDayTitle">${escapeHtml(dayLabel)}</h3>
            <span class="eventsDayCount">${dayEvents.length} event${dayEvents.length === 1 ? '' : 's'}</span>
          </div>`;

        dayEvents.forEach((e) => {
          const cardStyle = getEventCardStyle(e.type);
          const time = formatEventTime(e);
          html += `<article class="eventCard" style="${cardStyle}">
            <p class="eventTitle">${escapeHtml(formatEventTitle(e.title, e.type))}</p>
            ${time ? `<p class="eventTime">${escapeHtml(time)}</p>` : ''}
          </article>`;
        });

        html += '</section>';
      });

      listEl.innerHTML = html;
    }

    async function loadEventsPage() {
      try {
        const response = await fetch('/data/events.json');
        if (!response.ok) throw new Error('Failed to load events');
        const data = await response.json();

        const standardizedTests = Array.isArray(data.standardizedTests)
          ? data.standardizedTests.map((e) => ({ ...e, type: 'standardized-test' }))
          : [];
        const apTests = Array.isArray(data.apTests)
          ? data.apTests.map((e) => ({ ...e, type: 'ap-test' }))
          : [];
        const sportsEvents = Array.isArray(data.sports)
          ? data.sports.map((e) => ({ ...e, type: 'sports' }))
          : [];

        allEvents = [...standardizedTests, ...apTests, ...sportsEvents];

        // Filter to only followed events
        const followedIds = getProfileFollowedEvents();
        const followedEvents = allEvents.filter(e => followedIds.includes(e.id));

        // Build color map from followed events first, then render
        eventColorMap = {};
        nextColorIndex = 0;
        const uniqueTypes = getUniqueTypes(followedEvents);
        uniqueTypes.forEach(type => getEventColor(type));

        renderEvents(followedEvents);
        renderEventKey(uniqueTypes);
      } catch (error) {
        console.error('Events page load error:', error);
        renderNoFollowedEvents();
      }
    }

    (async () => {
      if (typeof window.loadCommon === 'function') {
        try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
      }
      await initApp();
      loadEventsPage();
      if (typeof window.hideLoader === 'function') window.hideLoader();
    })();
  </script>
</body>
</html>
