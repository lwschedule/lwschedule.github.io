<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holidays - LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  
  <div class="pageContainer">
    <h2>Upcoming Holidays 2025-26</h2>
      <div id="holidayCountdown">
        <div id="holidayCountdownLabel">NEXT HOLIDAY</div>
        <div id="holidayCountdownTime" class="countdown-grid">
          <div class="countdown-block">
            <span id="countdown-days" class="countdown-value">00</span>
            <span class="countdown-label">DAYS</span>
          </div>
          <div class="countdown-block">
            <span id="countdown-hours" class="countdown-value">00</span>
            <span class="countdown-label">HOURS</span>
          </div>
          <div class="countdown-block">
            <span id="countdown-minutes" class="countdown-value">00</span>
            <span class="countdown-label">MINUTES</span>
          </div>
          <div class="countdown-block">
            <span id="countdown-seconds" class="countdown-value">00</span>
            <span class="countdown-label">SECONDS</span>
          </div>
        </div>
        <div id="holidayCountdownMessage" style="display:none; font-size: 1.5em; text-align: center; padding: 30px 0;"></div>
      </div>
      <div id="holidays">
        <table class="holidayTable">
          <thead>
            <tr>
              <th>Holiday</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="holidayTableBody">
            <tr><td colspan="2">Loading holidays...</td></tr>
          </tbody>
        </table>
      </div>
  </div>
  <script src="/common-core.js"></script>
  <script>
    let holidayMorphs = {
      days: null,
      hours: null,
      minutes: null,
      seconds: null
    };

    function updateHolidayCountdownMorphs(data) {
      if (holidayMorphs.days) holidayMorphs.days.update(data.days.toString().padStart(2, '0'));
      if (holidayMorphs.hours) holidayMorphs.hours.update(data.hours.toString().padStart(2, '0'));
      if (holidayMorphs.minutes) holidayMorphs.minutes.update(data.minutes.toString().padStart(2, '0'));
      if (holidayMorphs.seconds) holidayMorphs.seconds.update(data.seconds.toString().padStart(2, '0'));
    }

    window.updateHolidayCountdownMorphs = updateHolidayCountdownMorphs;

    async function initHolidayCountdownMorphs() {
      try {
        if (getTorphWorkaroundNeeded && getTorphWorkaroundNeeded()) {
          window.updateHolidayCountdownMorphs = null;
          console.warn('Torph disabled on iOS < 17; using text updates.');
          return;
        }
        const { TextMorph } = await import('/vendor/torph.js');

        const daysHost = ensureMorphHost(document.getElementById('countdown-days'), 'countdown-value-morph');
        const hoursHost = ensureMorphHost(document.getElementById('countdown-hours'), 'countdown-value-morph');
        const minutesHost = ensureMorphHost(document.getElementById('countdown-minutes'), 'countdown-value-morph');
        const secondsHost = ensureMorphHost(document.getElementById('countdown-seconds'), 'countdown-value-morph');

        if (daysHost) {
          holidayMorphs.days = new TextMorph({
            element: daysHost,
            duration: 500,
            ease: 'ease-in-out'
          });
        }
        if (hoursHost) {
          holidayMorphs.hours = new TextMorph({
            element: hoursHost,
            duration: 600,
            ease: 'ease-in-out'
          });
        }
        if (minutesHost) {
          holidayMorphs.minutes = new TextMorph({
            element: minutesHost,
            duration: 700,
            ease: 'ease-in-out'
          });
        }
        if (secondsHost) {
          holidayMorphs.seconds = new TextMorph({
            element: secondsHost,
            duration: 800,
            ease: 'ease-in-out'
          });
        }

        // Seed from zero immediately before first live countdown update.
        updateHolidayCountdownMorphs({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      } catch (error) {
        window.updateHolidayCountdownMorphs = null;
        console.warn('Torph failed to load for holiday countdown, using default updates.', error);
      }
    }

    (async () => {
      if (typeof window.loadModules === 'function') {
        try { await window.loadModules(['navigation', 'data', 'schedule', 'calendar']); } catch (err) { console.error('Failed to load modules:', err); }
      }
      if (typeof initApp === 'function') await initApp();
    })();
  </script>
</body>
</html>
