<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holidays - LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  
  <div class="pageContainer">
    <h2>Upcoming Holidays 2025-26</h2>
      <div id="holidayCountdown">
        <div id="holidayCountdownLabel">NEXT HOLIDAY</div>
        <div id="holidayCountdownTime" class="countdown-grid">
          <div class="countdown-block">
            <span id="countdown-days" class="countdown-value">00</span>
            <span class="countdown-label">DAYS</span>
          </div>
          <div class="countdown-block">
            <span id="countdown-hours" class="countdown-value">00</span>
            <span class="countdown-label">HOURS</span>
          </div>
          <div class="countdown-block">
            <span id="countdown-minutes" class="countdown-value">00</span>
            <span class="countdown-label">MINUTES</span>
          </div>
          <div class="countdown-block">
            <span id="countdown-seconds" class="countdown-value">00</span>
            <span class="countdown-label">SECONDS</span>
          </div>
        </div>
        <div id="holidayCountdownMessage" style="display:none; font-size: 1.5em; text-align: center; padding: 30px 0;"></div>
      </div>
      <div id="holidays">
        <table class="holidayTable">
          <thead>
            <tr>
              <th>Holiday</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="holidayTableBody">
            <tr><td colspan="2">Loading holidays...</td></tr>
          </tbody>
        </table>
      </div>
  </div>
  <script src="/common-core.js"></script>
  <script>
    let holidayMorphs = {
      days: null,
      hours: null,
      minutes: null,
      seconds: null
    };

function updateHolidayCountdownMorphs(data) {
      // Get the elements
      const daysEl = document.getElementById('countdown-days');
      const hoursEl = document.getElementById('countdown-hours');
      const minutesEl = document.getElementById('countdown-minutes');
      const secondsEl = document.getElementById('countdown-seconds');
      
      // Update each element with the new values
      if (daysEl) {
        const numberFlow = daysEl.querySelector('number-flow');
        if (numberFlow) {
          numberFlow.setAttribute('value', data.days.toString());
        } else {
          daysEl.textContent = data.days.toString();
        }
      }
      
      if (hoursEl) {
        const numberFlow = hoursEl.querySelector('number-flow');
        if (numberFlow) {
          numberFlow.setAttribute('value', data.hours.toString().padStart(2, '0'));
        } else {
          hoursEl.textContent = data.hours.toString().padStart(2, '0');
        }
      }
      
      if (minutesEl) {
        const numberFlow = minutesEl.querySelector('number-flow');
        if (numberFlow) {
          numberFlow.setAttribute('value', data.minutes.toString().padStart(2, '0'));
        } else {
          minutesEl.textContent = data.minutes.toString().padStart(2, '0');
        }
      }
      
      if (secondsEl) {
        const numberFlow = secondsEl.querySelector('number-flow');
        if (numberFlow) {
          numberFlow.setAttribute('value', data.seconds.toString().padStart(2, '0'));
        } else {
          secondsEl.textContent = data.seconds.toString().padStart(2, '0');
        }
      }
    }

async function initHolidayCountdownMorphs() {
      try {
        // Check for iOS workaround
        if (getTorphWorkaroundNeeded && getTorphWorkaroundNeeded()) {
          window.updateHolidayCountdownMorphs = null;
          console.warn('Number Flow disabled on iOS < 17; using text updates.');
          return;
        }
        
        // Load Number Flow
        await import('/vendor/number-flow.js');
        
        // Create Number Flow elements for each countdown value
        const daysEl = document.getElementById('countdown-days');
        const hoursEl = document.getElementById('countdown-hours');
        const minutesEl = document.getElementById('countdown-minutes');
        const secondsEl = document.getElementById('countdown-seconds');

        // Create Number Flow elements
        if (daysEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', '0');
          numberFlow.setAttribute('format', 'decimal');
          daysEl.innerHTML = '';
          daysEl.appendChild(numberFlow);
        }
        
        if (hoursEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', '00');
          hoursEl.innerHTML = '';
          hoursEl.appendChild(numberFlow);
        }
        
        if (minutesEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', '00');
          minutesEl.innerHTML = '';
          minutesEl.appendChild(numberFlow);
        }
        
        if (secondsEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', '00');
          secondsEl.innerHTML = '';
          secondsEl.appendChild(numberFlow);
        }

        // Seed from zero immediately before first live countdown update.
        updateHolidayCountdownMorphs({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      } catch (error) {
        window.updateHolidayCountdownMorphs = null;
        console.warn('Number Flow failed to load for holiday countdown, using default updates.', error);
      }
    }
        
        if (hoursEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', hoursEl.textContent);
          hoursEl.innerHTML = '';
          hoursEl.appendChild(numberFlow);
        }
        
        if (minutesEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', minutesEl.textContent);
          minutesEl.innerHTML = '';
          minutesEl.appendChild(numberFlow);
        }
        
        if (secondsEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', secondsEl.textContent);
          secondsEl.innerHTML = '';
          secondsEl.appendChild(numberFlow);
        }

        // Seed from zero immediately before first live countdown update.
        updateHolidayCountdownMorphs({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      } catch (error) {
        window.updateHolidayCountdownMorphs = null;
        console.warn('Number Flow failed to load for holiday countdown, using default updates.', error);
      }
    }

    window.updateHolidayCountdownMorphs = updateHolidayCountdownMorphs;

    async function initHolidayCountdownMorphs() {
      try {
        // Check for iOS workaround
        if (getTorphWorkaroundNeeded && getTorphWorkaroundNeeded()) {
          window.updateHolidayCountdownMorphs = null;
          console.warn('Number Flow disabled on iOS < 17; using text updates.');
          return;
        }
        
        // Load Number Flow
        await import('/vendor/number-flow.js');
        
        // Create Number Flow elements for each countdown value
        const daysEl = document.getElementById('countdown-days');
        const hoursEl = document.getElementById('countdown-hours');
        const minutesEl = document.getElementById('countdown-minutes');
        const secondsEl = document.getElementById('countdown-seconds');

        // Create Number Flow elements
        if (daysEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', '0');
          numberFlow.setAttribute('format', 'decimal');
          daysEl.innerHTML = '';
          daysEl.appendChild(numberFlow);
        }
        
        if (hoursEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', '00');
          hoursEl.innerHTML = '';
          hoursEl.appendChild(numberFlow);
        }
        
        if (minutesEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', '00');
          minutesEl.innerHTML = '';
          minutesEl.appendChild(numberFlow);
        }
        
        if (secondsEl) {
          const numberFlow = document.createElement('number-flow');
          numberFlow.setAttribute('value', '00');
          secondsEl.innerHTML = '';
          secondsEl.appendChild(numberFlow);
        }

        // Seed from zero immediately before first live countdown update.
        updateHolidayCountdownMorphs({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      } catch (error) {
        window.updateHolidayCountdownMorphs = null;
        console.warn('Number Flow failed to load for holiday countdown, using default updates.', error);
      }
    }

    (async () => {
      if (typeof window.loadCommon === 'function') {
        try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
      }
      await initHolidayCountdownMorphs();
      await initApp();
    })();
  </script>
</body>
</html>
