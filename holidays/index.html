<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holidays - LW Schedule</title>
  <link rel="preconnect" href="https:
  <link rel="preconnect" href="https:
  <link href="https:
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  
  <div class="pageContainer">
    <h2>Upcoming Holidays 2025-26</h2>
      <div id="holidayCountdown">
        <div id="holidayCountdownLabel">NEXT HOLIDAY</div>
        <div id="holidayCountdownTime" class="countdown-grid">
          <div class="countdown-block">
            <span id="countdown-days" class="countdown-value">00</span>
            <span class="countdown-label">DAYS</span>
          </div>
          <div class="countdown-block">
            <span id="countdown-hours" class="countdown-value">00</span>
            <span class="countdown-label">HOURS</span>
          </div>
          <div class="countdown-block">
            <span id="countdown-minutes" class="countdown-value">00</span>
            <span class="countdown-label">MINUTES</span>
          </div>
          <div class="countdown-block">
            <span id="countdown-seconds" class="countdown-value">00</span>
            <span class="countdown-label">SECONDS</span>
          </div>
        </div>
        <div id="holidayCountdownMessage" style="display:none; font-size: 1.5em; text-align: center; padding: 30px 0;"></div>
      </div>
      <div id="holidays">
        <table class="holidayTable">
          <thead>
            <tr>
              <th>Holiday</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="holidayTableBody">
            <tr><td colspan="2">Loading holidays...</td></tr>
          </tbody>
        </table>
      </div>
  </div>
  <script src="/common.js"></script>
  <script>
    let holidayMorphs = {
      days: null,
      hours: null,
      minutes: null,
      seconds: null
    };

    function updateHolidayCountdownMorphs(data) {
      if (holidayMorphs.days) holidayMorphs.days.update(data.days.toString());
      if (holidayMorphs.hours) holidayMorphs.hours.update(data.hours.toString().padStart(2, '0'));
      if (holidayMorphs.minutes) holidayMorphs.minutes.update(data.minutes.toString().padStart(2, '0'));
      if (holidayMorphs.seconds) holidayMorphs.seconds.update(data.seconds.toString().padStart(2, '0'));
    }

    window.updateHolidayCountdownMorphs = updateHolidayCountdownMorphs;

    async function initHolidayCountdownMorphs() {
      try {
        await import('/vendor/number-flow.js');

        const ensureMorphHost = (containerEl) => {
          if (!containerEl) return null;
          let host = containerEl.querySelector('.countdown-value-morph');
          if (!host) {
            const initial = containerEl.textContent || '00';
            containerEl.textContent = '';
            host = document.createElement('number-flow');
            host.className = 'countdown-value-morph';
            host.textContent = initial;
            containerEl.appendChild(host);
          }
          return host;
        };

        const daysHost = ensureMorphHost(document.getElementById('countdown-days'));
        const hoursHost = ensureMorphHost(document.getElementById('countdown-hours'));
        const minutesHost = ensureMorphHost(document.getElementById('countdown-minutes'));
        const secondsHost = ensureMorphHost(document.getElementById('countdown-seconds'));

        holidayMorphs.days = daysHost;
        holidayMorphs.hours = hoursHost;
        holidayMorphs.minutes = minutesHost;
        holidayMorphs.seconds = secondsHost;

        // Seed from zero immediately before first live countdown update.
        updateHolidayCountdownMorphs({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      } catch (error) {
        console.warn('NumberFlow failed to load for holiday countdown, using default updates.', error);
      }
    }

    (async () => {
      await initHolidayCountdownMorphs();
      await initApp();
    })();
  </script>
</body>
</html>
