<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quarters/Semesters - LW Schedule</title>
  <link rel="preconnect" href="https:
  <link rel="preconnect" href="https:
  <link href="https:
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <style>
    .academic-term-list { display: flex; flex-direction: column; gap: 15px; }
    .term-card { background: var(--primary); border-radius: 12px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; transition: all 0.3s ease; }
    .term-card.highlight { background: var(--primary) !important;   color: white; box-shadow: var(--glow); }
    .term-info { flex: 1; min-width: 150px; }
    .term-name { font-size: 1.2em; font-weight: 700; margin-bottom: 5px; }
    .term-dates { font-size: 0.9em; opacity: 0.8; }
    .term-card.highlight .term-dates { opacity: 0.9; }
    .term-countdown { flex-shrink: 0; }
    .term-countdown-block { text-align: right; }
    .term-countdown-block .countdown-value { font-size: clamp(1.5em, 5vw, 2em); font-weight: 700; color: var(--primary-light); line-height: 1.1; }
    .term-countdown-block .countdown-value .term-countdown-value-morph { display: inline-block; min-width: 6ch; text-align: right; }
    .term-countdown-block .countdown-label { font-size: 0.7em; font-weight: 400; color: var(--text-light); opacity: 0.7; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
    .term-card.highlight .countdown-value { color: white; }
    .term-card.highlight .countdown-label { color: white; opacity: 0.9; }
    .term-completed-badge { background: var(--primary);   color: white; opacity: 0.8; padding: 8px 15px; border-radius: 20px; font-size: 0.9em; font-weight: 700; }
  </style>
</head>
<body>
  
  <div class="pageContainer">
    <h2>Quarters & Semesters</h2>
    <h3 style="color: white; margin-top: 20px; margin-bottom: 10px;">Quarters 2025-26</h3>
    <div id="quartersList" class="academic-term-list">
      <p>Loading quarters...</p>
    </div>
    <h3 style="color: white; margin-top: 30px; margin-bottom: 10px;">Semesters 2025-26</h3>
    <div id="semestersList" class="academic-term-list">
      <p>Loading semesters...</p>
    </div>
  </div>
  <script src="/common.js"></script>
  <script>
    let quartersInterval = null;
    let termCountdownSeedReleaseAt = 0;

    function formatTermDate(date) {
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getCountdownData(now, start, end) {
      const nowTime = now.getTime();
      const startTime = start.getTime();
      const endTime = end.getTime();
      if (nowTime > endTime) {
        return {
          completed: true,
          label: '',
          value: 'Completed'
        };
      }

      let diff, label;
      if (nowTime < startTime) { diff = startTime - nowTime; label = "Starts in"; }
      else { diff = endTime - nowTime; label = "Ends in"; }

      const totalSeconds = Math.floor(diff / 1000);
      const totalMinutes = Math.floor(totalSeconds / 60);
      const totalHours = Math.floor(totalMinutes / 60);
      const totalDays = Math.floor(totalHours / 24);

      let value, unit;
      if (totalDays > 0) { value = totalDays; unit = totalDays === 1 ? "Day" : "Days"; }
      else if (totalHours > 0) { value = totalHours; unit = totalHours === 1 ? "Hour" : "Hours"; }
      else if (totalMinutes > 0) { value = totalMinutes; unit = totalMinutes === 1 ? "Minute" : "Minutes"; }
      else { value = totalSeconds; unit = totalSeconds === 1 ? "Second" : "Seconds"; }

      return {
        completed: false,
        label,
        value: `${value} ${unit}`
      };
    }

    function renderTermCards() {
      const quartersListEl = document.getElementById('quartersList');
      const semestersListEl = document.getElementById('semestersList');
      if (!quartersListEl || !semestersListEl) return;

      quartersListEl.innerHTML = '';
      semestersListEl.innerHTML = '';

      academicTerms.quarters.forEach((term, index) => {
        const card = document.createElement('div');
        card.className = 'term-card';
        card.id = `quarter-card-${index}`;
        card.innerHTML = `
          <div class="term-info">
            <div class="term-name">${term.name}</div>
            <div class="term-dates">${formatTermDate(term.start)} — ${formatTermDate(term.end)}</div>
          </div>
          <div class="term-countdown">
            <div class="term-countdown-block">
              <span class="countdown-label term-countdown-label">--</span>
              <span class="countdown-value term-countdown-value"><number-flow class="term-countdown-value-morph">--</number-flow></span>
            </div>
            <div class="term-completed-badge term-completed-badge-inline" style="display:none;">Completed</div>
          </div>
        `;
        quartersListEl.appendChild(card);
      });

      academicTerms.semesters.forEach((term, index) => {
        const card = document.createElement('div');
        card.className = 'term-card';
        card.id = `semester-card-${index}`;
        card.innerHTML = `
          <div class="term-info">
            <div class="term-name">${term.name}</div>
            <div class="term-dates">${formatTermDate(term.start)} — ${formatTermDate(term.end)}</div>
          </div>
          <div class="term-countdown">
            <div class="term-countdown-block">
              <span class="countdown-label term-countdown-label">--</span>
              <span class="countdown-value term-countdown-value"><number-flow class="term-countdown-value-morph">--</number-flow></span>
            </div>
            <div class="term-completed-badge term-completed-badge-inline" style="display:none;">Completed</div>
          </div>
        `;
        semestersListEl.appendChild(card);
      });
    }

    function initTermMorphs() {
    }

    function seedTermCountdownsFromZero() {
      document.querySelectorAll('.term-countdown-block').forEach((block) => {
        const labelEl = block.querySelector('.term-countdown-label');
        const valueHost = block.querySelector('.term-countdown-value-morph');
        if (labelEl) {
          labelEl.textContent = 'Starts in';
        }
        if (valueHost) {
          if (typeof valueHost.update === 'function') {
            valueHost.update('0 Seconds');
          } else {
            valueHost.textContent = '0 Seconds';
          }
        }
      });
    }

    function setTermCountdown(cardEl, countdownData) {
      if (!cardEl) return;
      const block = cardEl.querySelector('.term-countdown-block');
      const badge = cardEl.querySelector('.term-completed-badge-inline');
      const labelEl = cardEl.querySelector('.term-countdown-label');
      const valueHost = cardEl.querySelector('.term-countdown-value-morph');

      if (!block || !badge || !labelEl || !valueHost) return;

      if (termCountdownSeedReleaseAt && Date.now() < termCountdownSeedReleaseAt) {
        return;
      }

      if (countdownData.completed) {
        block.style.display = 'none';
        badge.style.display = 'inline-block';
        return;
      }

      block.style.display = 'block';
      badge.style.display = 'none';
      labelEl.textContent = countdownData.label;

      if (typeof valueHost.update === 'function') {
        valueHost.update(countdownData.value);
      } else {
        valueHost.textContent = countdownData.value;
      }
    }

    function updateQuartersAndSemesters() {
      const now = new Date();
      const quartersListEl = document.getElementById('quartersList');
      const semestersListEl = document.getElementById('semestersList');
      if (!quartersListEl || !semestersListEl) {
        if (quartersInterval) { clearInterval(quartersInterval); quartersInterval = null; }
        return;
      }

      academicTerms.quarters.forEach((term, index) => {
        const card = document.getElementById(`quarter-card-${index}`);
        if (!card) return;
        const isActive = now >= term.start && now <= term.end;
        card.classList.toggle('highlight', isActive);
        setTermCountdown(card, getCountdownData(now, term.start, term.end));
      });

      academicTerms.semesters.forEach((term, index) => {
        const card = document.getElementById(`semester-card-${index}`);
        if (!card) return;
        const isActive = now >= term.start && now <= term.end;
        card.classList.toggle('highlight', isActive);
        setTermCountdown(card, getCountdownData(now, term.start, term.end));
      });
    }

    (async () => {
      try {
        await import('/vendor/number-flow.js');
      } catch (error) {
        console.warn('NumberFlow failed to load for quarters/semesters, using default updates.', error);
      }

      await initApp();

      renderTermCards();
      initTermMorphs();
      seedTermCountdownsFromZero();
      termCountdownSeedReleaseAt = Date.now() + 2000;
      setTimeout(() => {
        termCountdownSeedReleaseAt = 0;
        updateQuartersAndSemesters();
      }, 2000);
      updateQuartersAndSemesters();
      if (quartersInterval) clearInterval(quartersInterval);
      quartersInterval = setInterval(updateQuartersAndSemesters, 1000);
    })();
  </script>
</body>
</html>
