<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBA Schedule - LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4b2e83">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  <a href="/schedules" class="backBtn">← Back</a>
  <div class="pageContainer">
    <h2>SBA Schedule</h2>
    <p style="text-align: center; opacity: 0.8;">April 6-10, 2026</p>
    <div id="sbaScheduleContent"></div>
  </div>
  <script src="/common.js"></script>
  <script>
    (async () => {
      await initApp();
      const content = document.getElementById('sbaScheduleContent');
      const schedules = schedulesData.sba;
      const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
      const storedPrefs = (typeof sbaLunchPreferences === 'object' && sbaLunchPreferences) ? sbaLunchPreferences : null;

      function getScheduleForDay(dayName, defaultLunch = 'A') {
        const daySchedule = schedules[dayName];
        if (Array.isArray(daySchedule)) {
          return daySchedule;
        } else if (daySchedule && daySchedule[defaultLunch]) {
          return daySchedule[defaultLunch];
        }
        return [];
      }

      let html = '';
      weekDays.forEach(day => {
        html += `<h3 style="color: white; margin-top: 30px;">${day}</h3>`;
        const defaultLunch = storedPrefs && storedPrefs[day]
          ? storedPrefs[day]
          : ((day === 'Monday' || day === 'Friday') ? 'A' : 'All');
        const daySchedule = getScheduleForDay(day, defaultLunch);
        if (!daySchedule || daySchedule.length === 0) {
          html += '<p style="text-align: center; opacity: 0.8;">No School</p>';
        } else {
          html += renderScheduleTable(daySchedule, null, true);
        }
      });
      content.innerHTML = html;
    })();
  </script>
</body>
</html>
