<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilot 3 Schedule - LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <style>
    .schedule-image { width: 100%; max-width: 650px; margin: 20px auto; border-radius: 12px; box-shadow: var(--glow); display: block; }
  </style>
</head>
<body>
  <a href="/schedules" class="icon-back-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
  
  <div class="pageContainer">
    <h2>Pilot 3 Schedule</h2>
    <p style="text-align: center; opacity: 0.8;">March 30-April 3, 2026</p>
    <div id="pilot3ScheduleContent"></div>
  </div>
  <script src="/common.js"></script>
  <script>
    (async () => {
      await initApp();
      const content = document.getElementById('pilot3ScheduleContent');
      const schedules = schedulesData.pilot3;
      const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

      function getScheduleForDay(dayName, defaultLunch = 'A') {
        const daySchedule = schedules[dayName];
        if (Array.isArray(daySchedule)) {
          return daySchedule;
        } else if (daySchedule && daySchedule[defaultLunch]) {
          return daySchedule[defaultLunch];
        }
        return [];
      }

      const storedPrefs = (typeof pilot3LunchPreferences === 'object' && pilot3LunchPreferences) ? pilot3LunchPreferences : null;
      let html = '';
      weekDays.forEach(day => {
        html += `<h3 style="color: white; margin-top: 30px;">${day}</h3>`;
        const defaultLunch = storedPrefs && storedPrefs[day] ? storedPrefs[day] : 'A';
        const daySchedule = getScheduleForDay(day, defaultLunch);
        if (!daySchedule || daySchedule.length === 0) {
          html += '<p style="text-align: center; opacity: 0.8;">No School</p>';
        } else {
          html += renderScheduleTable(daySchedule, null, true);
        }
      });
      content.innerHTML = html;
    })();
  </script>
</body>
</html>
