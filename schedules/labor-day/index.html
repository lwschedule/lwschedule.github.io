<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labor Day - LW Schedule</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <script src="/loader.js"></script>
</head>
<body>
  <a href="/schedules" class="icon-back-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
  
  <div class="pageContainer">
    <h2>Labor Day</h2>
    <p style="text-align: center; opacity: 0.8;">Sept 7 – 11, 2026</p>
    <div id="laborDayContent"></div>
  </div>
  <script src="/common-core.js"></script>
  <script>
    (async () => {
      if (typeof window.loadCommon === 'function') {
        try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
      }
      await initApp();
      const content = document.getElementById('laborDayContent');
      const schedules = (typeof schedulesData === 'object' && schedulesData && schedulesData.normal && schedulesData.normal['labor-day']) ? schedulesData.normal['labor-day'] : {};
      const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

      function getScheduleForDay(dayName, defaultLunch = 'A') {
        const daySchedule = schedules[dayName];
        if (Array.isArray(daySchedule)) {
          return daySchedule;
        } else if (daySchedule && daySchedule[defaultLunch]) {
          return daySchedule[defaultLunch];
        }
        return [];
      }

      let html = '';
      weekDays.forEach(day => {
        html += `<h3 style="color: white; margin-top: 30px;">${day}</h3>`;
        if (day === 'Monday') {
          html += '<div class="noSchoolMessage"><h3>Labor Day</h3><p>No School</p></div>';
        } else {
          const daySchedule = getScheduleForDay(day);
          const isNoSchool = !daySchedule
            || daySchedule.length === 0
            || daySchedule === 'No School'
            || (Array.isArray(daySchedule) && daySchedule.length === 1 && daySchedule[0] === 'No School');
          if (isNoSchool) {
            html += '<div class="noSchoolMessage"><h3>No School</h3><p>Enjoy your day!</p></div>';
          } else {
            html += renderScheduleTable(daySchedule, null, true);
          }
        }
      });
      content.innerHTML = html;
      if (typeof window.hideLoader === 'function') window.hideLoader();
    })();
  </script>
</body>
</html>
