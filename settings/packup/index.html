<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pack-Up Reminders - LW Schedule</title>
  <link rel="preconnect" href="https:
  <link rel="preconnect" href="https:
  <link href="https:
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <style>

.pageContainer { max-width: 650px; margin: 0 auto; padding: 80px 0 20px 0; }
.description { text-align: center; opacity: 0.8; font-size: 0.9em; margin: 10px 0 20px; }
.settingsRow { padding: 0; margin: 0 0 15px 0; background: transparent; }
.settingsRow label { display: block; margin-bottom: 8px; font-weight: 700; }
.pack-up-input { background: var(--card-dark); color: var(--text-light); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--primary-light); box-shadow: var(--glow); font-size: 1.2em; font-weight: 700; cursor: pointer; width: 100%; box-sizing: border-box; text-align: center; -moz-appearance: textfield; }
.pack-up-input::-webkit-outer-spin-button,
.pack-up-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.pack-up-input::placeholder { color: var(--text-light); opacity: 0.5; font-weight: 400; font-size: 0.9em; }
.pack-up-presets { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
.pack-up-preset { flex: 1; background: var(--card-dark); color: var(--text-light); border: 2px solid var(--primary-light); padding: 10px 15px; font-size: 1em; border-radius: 12px; cursor: pointer; transition: all 0.3s; font-weight: 700; }
.pack-up-preset:hover { background: var(--primary-light); color: white; transform: scale(1.05); }
.saveBtn { display: block; width: 100%; background: var(--primary-light); color: white; border: none; padding: 15px 40px; font-size: 1.1em; border-radius: 12px; cursor: pointer; box-shadow: var(--glow); transition: all 0.3s; font-weight: 700; margin-top: 20px; }
.saveBtn:hover { transform: scale(1.05); }
.switch { position: relative; display: inline-block; width: 50px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ff3b30; transition: .4s; border-radius: 34px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
.slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: #34c759; }
input:checked + .slider:before { transform: translateX(26px); }
.resetBtn { display: block; width: 100%; background: var(--primary); color: white; border: none; padding: 12px 30px; font-size: 1em; border-radius: 12px; cursor: pointer; transition: all 0.3s; font-weight: 700; margin-top: 20px; text-decoration: none; text-align: center; }
.resetBtn:hover { background: #9d182e; transform: scale(1.05); }
@media (max-width: 600px) {
    .pageContainer { padding: 20px 0 0 0; }
}
  </style>
</head>
<body>
  
  <div class="pageContainer">
    <a href="/settings" class="icon-back-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
    <h2>Pack-Up Reminders</h2>
    <p class="description">Get notified before class ends so you have time to pack up.</p>
    <div class="settingsRow">
      <label for="packUpTimeInput">Notify me minutes before class ends:</label>
      <input type="number" id="packUpTimeInput" class="pack-up-input" min="0" max="30" placeholder="type a number or select from below">
      <div class="pack-up-presets">
        <button class="pack-up-preset" data-value="0">Off</button>
        <button class="pack-up-preset" data-value="1">1</button>
        <button class="pack-up-preset" data-value="3">3</button>
        <button class="pack-up-preset" data-value="5">5</button>
        <button class="pack-up-preset" data-value="7">7</button>
        <button class="pack-up-preset" data-value="10">10</button>
      </div>
    </div>
    <div class="settingsRow">
      <label for="notificationToggle">Pack-Up Reminders</label>
      <div style="display: flex; align-items: center; gap: 15px; justify-content: center; margin-top: 10px;">
        <span style="font-size: 0.9em; opacity: 0.8;">Off</span>
        <label class="switch">
          <input type="checkbox" id="notificationToggle">
          <span class="slider"></span>
        </label>
        <span style="font-size: 0.9em; opacity: 0.8;">On</span>
      </div>
      <div id="notificationStatus" style="text-align: center; margin-top: 10px; font-size: 0.9em; opacity: 0.8;"></div>
    </div>
    <button class="saveBtn" id="testNotificationBtn">Test Notification</button>
    <button class="resetBtn" id="resetPackupBtn">Reset Pack-Up Reminders to Default</button>
  </div>
  <script>
function checkSetupComplete() {
      const lunch = localStorage.getItem('lunchPreferences');
  const packup = localStorage.getItem('pack-up-time');
  const setupComplete = localStorage.getItem('setup-complete');
if (!setupComplete && !window.location.pathname.includes('/setup')) {
if (!lunch || packup === null) {
navigateWithTransition('/setup', { replace: true });
return false;
}
}
return true;
}
let packUpTime = parseInt(localStorage.getItem('pack-up-time') || '0', 10);
const input = document.getElementById('packUpTimeInput');
if (packUpTime > 0) {
input.value = packUpTime;
}
document.querySelectorAll('.pack-up-preset').forEach(btn => {
btn.addEventListener('click', () => {
const val = parseInt(btn.dataset.value, 10);
input.value = val > 0 ? val : '';
});
});
input.addEventListener('input', () => {
  let val = parseInt(input.value, 10);
  if (isNaN(val) || val < 0) return;
  if (val > 30) {
    input.value = 30;
    val = 30;
  }
  localStorage.setItem('pack-up-time', val);
});
input.addEventListener('change', () => {
  let val = parseInt(input.value, 10);
  if (isNaN(val) || val < 0) {
    input.value = '';
    localStorage.setItem('pack-up-time', 0);
  }
});

document.getElementById('testNotificationBtn').addEventListener('click', () => {
  if ('Notification' in window && Notification.permission === 'granted') {
    sendNotification('Pack-Up Reminder', {
      body: 'This is a test notification.',
      icon: '/images/logo.png',
      requireInteraction: true
    });
  } else {
    alert('Please enable browser notifications first.');
  }
});


const notificationToggle = document.getElementById('notificationToggle');
const notificationStatus = document.getElementById('notificationStatus');


if ('Notification' in window) {
  
  const notificationsEnabled = localStorage.getItem('notifications-enabled') === 'true';
  notificationToggle.checked = notificationsEnabled;
  
  
  updateNotificationStatus();
  
  
  notificationToggle.addEventListener('change', async () => {
    if (notificationToggle.checked) {
      
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        localStorage.setItem('notifications-enabled', 'true');
        updateNotificationStatus();
      } else {
        notificationToggle.checked = false;
        localStorage.setItem('notifications-enabled', 'false');
        notificationStatus.innerHTML = '❌ Notifications blocked by browser';
        notificationStatus.style.color = '#ff4757';
      }
    } else {
      localStorage.setItem('notifications-enabled', 'false');
      updateNotificationStatus();
    }
  });
} else {
  notificationToggle.disabled = true;
  notificationStatus.innerHTML = '❌ Browser does not support notifications';
  notificationStatus.style.color = '#ff4757';
}

function updateNotificationStatus() {
  const notificationsEnabled = localStorage.getItem('notifications-enabled') === 'true';
  if (notificationsEnabled) {
    if (Notification.permission !== 'granted') {
      notificationStatus.innerHTML = '⚠️ Reminders on, but browser notification permission missing';
      notificationStatus.style.color = '#ff9f43';
    } else {
      notificationStatus.innerHTML = '';
    }
  } else {
    notificationStatus.innerHTML = '';
  }
}
`;
}

document.getElementById('resetPackupBtn').addEventListener('click', () => {
    document.getElementById('packUpTimeInput').value = '';
    
    document.querySelectorAll('.pack-up-preset').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.value === '0');
    });
    
    const notificationToggle = document.getElementById('notificationToggle');
    if (notificationToggle) notificationToggle.checked = false;
    
    localStorage.setItem('pack-up-time', '0');
    localStorage.setItem('notifications-enabled', 'false');
    updateNotificationStatus();
});

checkSetupComplete();
</script>
</body>
</html>
