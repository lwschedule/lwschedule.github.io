<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classes - LW Schedule</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <style>
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: var(--card-dark);
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .toggle-label {
      font-size: 1.05em;
      font-weight: 600;
    }
    .toggle-switch {
      position: relative;
      width: 60px;
      height: 32px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ff3b30; transition: .4s; border-radius: 34px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background: #34c759;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(28px);
    }
    .classes-content {
      display: none;
    }
    .classes-content.enabled {
      display: block;
    }
    .search-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 1em;
      border: 2px solid var(--primary);
      border-radius: 10px;
      background: var(--card-dark);
      color: var(--text-light);
      outline: none;
      transition: all 0.3s;
      margin-bottom: 15px;
    }
    .search-input:focus {
      box-shadow: 0 0 10px rgba(75, 46, 131, 0.5);
    }
    .search-input::placeholder {
      color: #888;
    }
    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .action-btn {
      flex: 1;
      padding: 10px 14px;
      font-size: 0.9em;
      font-weight: 600;
      border: 2px solid var(--primary);
      border-radius: 10px;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s;
    }
    .action-btn:hover {
      background: var(--primary);
    }
    .classes-results {
      background: var(--card-dark);
      border-radius: 12px;
      max-height: 260px;
      overflow-y: auto;
      margin-bottom: 20px;
      border: 1px solid var(--primary-light);
    }
    .class-result {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border: none;
      border-bottom: 1px solid var(--primary-light);
      background: transparent;
      color: var(--text-light);
      text-align: left;
      cursor: pointer;
      font-size: 0.92em;
    }
    .class-result:last-child {
      border-bottom: none;
    }
    .class-result:hover {
      background: rgba(75, 46, 131, 0.2);
    }
    .class-result.added,
    .class-result:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      background: rgba(60, 37, 105, 0.25);
    }
    .result-tag {
      font-size: 0.75em;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--primary);
      color: #bfaee8;
      margin-left: 10px;
      white-space: nowrap;
      min-width: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .result-tag-icon {
      width: 12px;
      height: 12px;
      display: block;
      filter: brightness(0) saturate(100%) invert(83%) sepia(8%) saturate(1250%) hue-rotate(214deg) brightness(93%) contrast(93%);
    }
    .slots-container {
      background: var(--card-dark);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid var(--primary-light);
    }
    .slot-row {
      display: grid;
      grid-template-columns: 40px 1fr 40px;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .slot-row:last-child {
      margin-bottom: 0;
    }
    .slot-arrow {
      height: 40px;
      border-radius: 10px;
      border: 2px solid var(--primary);
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      font-size: 1.1em;
      font-weight: 700;
      transition: all 0.2s;
    }
    .slot-arrow:hover:not(:disabled) {
      background: var(--primary);
    }
    .slot-arrow:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .slot-card {
      background: #141414;
      border: 1px solid var(--primary-light);
      border-radius: 10px;
      padding: 10px 12px;
      min-height: 62px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }
    .slot-row.empty .slot-card {
      opacity: 0.75;
    }
    .slot-period {
      font-size: 0.76em;
      color: #9f9f9f;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .slot-value {
      font-size: 0.92em;
      font-weight: 600;
      line-height: 1.3;
    }
    .slot-clear {
      margin-top: 2px;
      width: fit-content;
      border: 1px solid var(--primary-light);
      background: transparent;
      color: #b7b7b7;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.72em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      min-height: 22px;
    }
    .slot-clear:hover {
      color: white;
      border-color: #7b7b7b;
    }
    .slot-clear-icon {
      width: 12px;
      height: 12px;
      display: block;
      filter: brightness(0) saturate(100%) invert(77%) sepia(1%) saturate(8%) hue-rotate(316deg) brightness(92%) contrast(89%);
    }
    .classes-count {
      text-align: center;
      font-size: 0.9em;
      color: #aaa;
      margin-top: 14px;
    }
    .counter-morph {
      display: inline-block;
      text-align: center;
    }
    .classes-message {
      min-height: 1.2em;
      text-align: center;
      font-size: 0.86em;
      color: #cdb9ff;
      margin: 12px 0 2px;
    }
  </style>
</head>
<body>
  
  <div class="pageContainer">
    <a href="/settings" class="icon-back-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
    <h2>Classes</h2>

    <div class="toggle-container">
      <span class="toggle-label">Classes</span>
      <label class="toggle-switch">
        <input type="checkbox" id="classesToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="classes-content" id="classesContent">
      <input type="text" id="classSearch" class="search-input" placeholder="Search classes...">

      <div class="classes-results" id="classResults"></div>

      <div class="slots-container" id="selectedClassesList"></div>
      <p class="classes-count" id="classesCount">0 of 6 slots filled</p>
      <p class="classes-message" id="classesMessage"></p>
      
      <button type="button" class="resetBtn" id="resetClassesBtn">Reset Classes to Default</button>
    </div>
  </div>

  <script src="/common-core.js"></script>
  <script>
    if (window.location.pathname.startsWith('/settings')) {
      window.location.replace('/profile');
    }
  </script>
  <script>
    (async () => {
      if (typeof window.loadCommon === 'function') {
        try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
      }
    const classManager = createClassSlotManager({
      slotsId: 'selectedClassesList',
      countId: 'classesCount',
      messageId: 'classesMessage',
      onSave: (slots) => setSelectedClassesSlots(slots),
    });

    async function init() {
      const classesEnabled = isClassesEnabled();
      const classesToggle = document.getElementById('classesToggle');
      const classesContent = document.getElementById('classesContent');

      classesToggle.checked = classesEnabled;
      classesContent.classList.toggle('enabled', classesEnabled);

      classesToggle.addEventListener('change', (e) => {
        const enabled = e.target.checked;
        setClassesEnabled(enabled);
        classesContent.classList.toggle('enabled', enabled);
      });

      document.getElementById('classSearch').addEventListener('input', (e) => {
        classManager.renderResults(e.target.value);
      });

      document.getElementById('resetClassesBtn').addEventListener('click', () => {
        setClassesEnabled(false);
        document.getElementById('classesToggle').checked = false;
        document.getElementById('classesContent').classList.remove('enabled');
        classManager.reset();
      });

      classManager.load();
    }

    checkSetupComplete();
    init();
    })();
  </script>
</body>
</html></html>
