<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone Caddy Reminders - Settings</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  <div class="homeHeaderRow">
    <h1> </h1>
    <div class="topRightButtons">
    </div>
  </div>
  <div class="pageContainer">
    <a href="/settings" class="icon-back-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
    <h2>Phone Caddy</h2>

    <div class="toggle-container">
      <span class="toggle-label">Phone Caddy</span>
      <label class="toggle-switch">
        <input type="checkbox" id="caddyToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
    
    <div class="settingsRow" id="periodInputsContainer">
      <label>Enter your assigned phone caddy spot number for each class:</label>
      <div class="stack-vertical">
        <div><label class="subtle-label">Period 1</label><input type="number" id="caddyTime1" class="pack-up-input" min="1" placeholder="e.g. 5"></div>
        <div><label class="subtle-label">Period 2</label><input type="number" id="caddyTime2" class="pack-up-input" min="1" placeholder="e.g. 12"></div>
        <div><label class="subtle-label">Period 3</label><input type="number" id="caddyTime3" class="pack-up-input" min="1" placeholder="e.g. 15"></div>
        <div><label class="subtle-label">Period 4</label><input type="number" id="caddyTime4" class="pack-up-input" min="1" placeholder="e.g. 8"></div>
        <div><label class="subtle-label">Period 5</label><input type="number" id="caddyTime5" class="pack-up-input" min="1" placeholder="e.g. 21"></div>
        <div><label class="subtle-label">Period 6</label><input type="number" id="caddyTime6" class="pack-up-input" min="1" placeholder="e.g. 4"></div>
      </div>
    </div>

    <div class="settingsRow">
      <div id="caddyStatus" class="center-text description" style="margin-top: 10px;"></div>
    </div>
    
    <button class="saveBtn" id="saveCaddyBtn">Save</button>
    <button class="saveBtn" id="testNotificationBtn" style="margin-bottom: 20px;">Test Notification</button>
    <button class="resetBtn" id="resetCaddyBtn" style="margin-top: 10px;">Reset Settings</button>
  </div>
  
  <script src="/common-core.js"></script>
  <script>
    (async () => {
      if (typeof window.loadCommon === 'function') {
        try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
      }

    const caddyToggle = document.getElementById('caddyToggle');
    const caddyStatus = document.getElementById('caddyStatus');
    const saveCaddyBtn = document.getElementById('saveCaddyBtn');
    let saveMorph = null;

    let caddyTimes = JSON.parse(localStorage.getItem('phone-caddy-times') || '{"1": "", "2": "", "3": "", "4": "", "5": "", "6": ""}');
    for (let i = 1; i <= 6; i++) {
        const val = caddyTimes[i.toString()];
        if(val !== undefined && val !== "") {
            document.getElementById(`caddyTime${i}`).value = val;
        }
    }

    async function initSaveMorph() {
      try {
        const { TextMorph } = await import('/vendor/torph.js');
        let host = saveCaddyBtn.querySelector('.save-morph');
        if (!host) {
          host = document.createElement('span');
          host.className = 'save-morph';
          host.textContent = saveCaddyBtn.textContent;
          saveCaddyBtn.textContent = '';
          saveCaddyBtn.appendChild(host);
        }
        saveMorph = new TextMorph({ element: host });
      } catch (error) {
        console.warn('Torph failed to load', error);
      }
    }

    function updateSaveBtn(text) {
      if (saveMorph) {
        saveMorph.update(text);
      } else {
        saveCaddyBtn.textContent = text;
      }
    }

    function updateCaddyStatus() {
      const enabled = localStorage.getItem('phone-caddy-enabled') === 'true';
      if (enabled) {
        if (Notification.permission === 'granted') {
          caddyStatus.innerHTML = '';
          caddyStatus.parentElement.style.display = 'none';
        } else {
          caddyStatus.innerHTML = '⚠️ Reminders on, but browser notification permission missing';
          caddyStatus.style.color = 'var(--accent-orange)';
          caddyStatus.parentElement.style.display = 'block';
        }
      } else {
        caddyStatus.innerHTML = '';
        caddyStatus.parentElement.style.display = 'none';
      }
    }

    if ('Notification' in window) {
      const caddyEnabled = localStorage.getItem('phone-caddy-enabled') === 'true';
      caddyToggle.checked = caddyEnabled;
      updateCaddyStatus();
      
      caddyToggle.addEventListener('change', async () => {
        if (caddyToggle.checked) {
          const permission = await Notification.requestPermission();
          if (permission === 'granted') {
            localStorage.setItem('phone-caddy-enabled', 'true');
            // Check global notifications
            localStorage.setItem('notifications-enabled', 'true');
          } else {
            caddyToggle.checked = false;
            localStorage.setItem('phone-caddy-enabled', 'false');
            caddyStatus.innerHTML = '❌ Notifications blocked by browser';
            caddyStatus.style.color = 'var(--accent-red)';
            return;
          }
        } else {
          localStorage.setItem('phone-caddy-enabled', 'false');
        }
        updateCaddyStatus();
      });
    } else {
      caddyToggle.disabled = true;
      caddyStatus.innerHTML = '❌ Browser does not support notifications';
      caddyStatus.style.color = 'var(--accent-red)';
    }

    document.getElementById('testNotificationBtn').addEventListener('click', async () => {
      let testSpot = document.getElementById('caddyTime1').value || "12";
      if (!("Notification" in window)) {
        alert("This browser does not support desktop notifications.");
        return;
      }
      let perm = Notification.permission;
      if (perm !== "granted" && perm !== "denied") {
        perm = await Notification.requestPermission();
      }
      if (perm === "granted") {
        sendNotification("Phone Caddy Reminder", {
          body: `Class starts in 1 minute! Put your phone in caddy spot #${testSpot}`,
          icon: "/icons/icon-192.png"
        });
      } else {
        alert("Notification permission is blocked. Please enable it in browser settings.");
      }
    });

    document.querySelectorAll('.pack-up-input').forEach(input => {
      input.addEventListener('change', () => {
        for (let i = 1; i <= 6; i++) {
          caddyTimes[i.toString()] = document.getElementById(`caddyTime${i}`).value || "";
        }
      });
    });

    saveCaddyBtn.addEventListener('click', async () => {
      for (let i = 1; i <= 6; i++) {
        caddyTimes[i.toString()] = document.getElementById(`caddyTime${i}`).value || "";
      }
      localStorage.setItem('phone-caddy-times', JSON.stringify(caddyTimes));
      updateSaveBtn('✅');
      saveCaddyBtn.style.background = 'var(--accent-green)';
      setTimeout(() => {
        updateSaveBtn('Save');
        saveCaddyBtn.style.background = 'var(--primary-light)';
      }, 1500);
    });

    document.getElementById('resetCaddyBtn').addEventListener('click', () => {
      for (let i = 1; i <= 6; i++) {
        document.getElementById(`caddyTime${i}`).value = '';
      }
      localStorage.setItem('phone-caddy-times', '{"1": "", "2": "", "3": "", "4": "", "5": "", "6": ""}');
      localStorage.setItem('phone-caddy-enabled', 'false');
      caddyToggle.checked = false;
      updateCaddyStatus();
    });

    initSaveMorph();
    })();
  </script>
</body>
</html>
