<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clubs - LW Schedule</title>
  <link rel="preconnect" href="https:
  <link rel="preconnect" href="https:
  <link href="https:
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4b2e83">
  <link rel="stylesheet" href="/common.css">
  <style>
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: var(--card-dark);
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .toggle-label {
      font-size: 1.1em;
      font-weight: 600;
    }
    .toggle-switch {
      position: relative;
      width: 60px;
      height: 32px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444;
      transition: 0.4s;
      border-radius: 32px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
    }
    input:checked + .toggle-slider:before {
      transform: translateX(28px);
    }
    .clubs-content {
      display: none;
    }
    .clubs-content.enabled {
      display: block;
    }
    .search-container {
      margin-bottom: 15px;
    }
    .search-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 1em;
      font-family: 'SF Pro Rounded', sans-serif;
      border: 2px solid var(--primary);
      border-radius: 10px;
      background: var(--card-dark);
      color: var(--text-light);
      outline: none;
      transition: all 0.3s;
    }
    .search-input:focus {
      box-shadow: 0 0 10px rgba(75, 46, 131, 0.5);
    }
    .search-input::placeholder {
      color: #888;
    }
    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .select-btn {
      flex: 1;
      padding: 10px 15px;
      font-size: 0.9em;
      font-family: 'SF Pro Rounded', sans-serif;
      font-weight: 600;
      border: 2px solid var(--primary);
      border-radius: 10px;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s;
    }
    .select-btn:hover {
      background: var(--primary);
    }
    .clubs-list-container {
      background: var(--card-dark);
      border-radius: 12px;
      max-height: 400px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) var(--card-dark);
    }
    .clubs-list-container::-webkit-scrollbar {
      width: 8px;
    }
    .clubs-list-container::-webkit-scrollbar-track {
      background: var(--card-dark);
      border-radius: 4px;
    }
    .clubs-list-container::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
    .club-item {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      border-bottom: 1px solid #333;
      transition: background 0.2s;
    }
    .club-item:last-child {
      border-bottom: none;
    }
    .club-item:hover {
      background: rgba(75, 46, 131, 0.2);
    }
    .club-item.selected {
      background: rgba(75, 46, 131, 0.3);
    }
    .club-checkbox {
      width: 22px;
      height: 22px;
      margin-right: 15px;
      cursor: pointer;
      accent-color: var(--primary);
    }
    .club-info {
      flex: 1;
    }
    .club-name {
      font-weight: 600;
      font-size: 0.95em;
      margin-bottom: 3px;
    }
    .club-details {
      font-size: 0.8em;
      color: #aaa;
    }
    .no-clubs-message {
      text-align: center;
      padding: 30px;
      color: #888;
    }
    .selected-count {
      text-align: center;
      font-size: 0.9em;
      color: #aaa;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <a href="/settings" class="backBtn">← Back</a>
  <div class="pageContainer">
    <h2>Clubs</h2>
    
    <div class="toggle-container">
      <span class="toggle-label">Show Clubs in Schedule</span>
      <label class="toggle-switch">
        <input type="checkbox" id="clubsToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
    
    <div class="clubs-content" id="clubsContent">
      <div class="search-container">
        <input type="text" class="search-input" id="clubSearch" placeholder="Search clubs...">
      </div>
      
      <div class="button-row">
        <button class="select-btn" id="selectAllBtn">Select All</button>
        <button class="select-btn" id="deselectAllBtn">Deselect All</button>
      </div>
      
      <div class="clubs-list-container" id="clubsList">
        <p class="no-clubs-message">Loading clubs...</p>
      </div>
      
      <p class="selected-count" id="selectedCount">0 clubs selected</p>
    </div>
  </div>
  
  <script src="/common.js"></script>
  <script>
    let allClubs = [];
    let selectedClubs = [];
    
    
    async function loadClubs() {
      try {
        const response = await fetch('/data/clubs.json');
        const data = await response.json();
        allClubs = data.clubs;
        renderClubsList();
      } catch (error) {
        console.error('Error loading clubs:', error);
        document.getElementById('clubsList').innerHTML = '<p class="no-clubs-message">Error loading clubs</p>';
      }
    }
    
    
    function formatClubTime(club) {
      const startHour = club.startHour;
      const startMinute = club.startMinute;
      const endHour = club.endHour;
      const endMinute = club.endMinute;
      
      const formatTime = (h, m) => {
        const ampm = h >= 12 ? 'PM' : 'AM';
        const hour12 = h % 12 || 12;
        return `${hour12}:${m.toString().padStart(2, '0')} ${ampm}`;
      };
      
      return `${formatTime(startHour, startMinute)} - ${formatTime(endHour, endMinute)}`;
    }
    
    
    function formatClubDays(club) {
      const days = club.days || (club.day ? [club.day] : []);
      return days.join(', ');
    }
    
    
    function getFrequencyLabel(frequency) {
      switch(frequency) {
        case 'weekly': return '';
        case 'every-other': return ' (Every Other)';
        case 'biweekly': return ' (Biweekly)';
        case 'last-of-month': return ' (Last of Month)';
        case 'monthly': return ' (Monthly)';
        case 'alternating': return ' (Alternating)';
        default: return '';
      }
    }
    
    
    function renderClubsList(filter = '') {
      const container = document.getElementById('clubsList');
      const filterLower = filter.toLowerCase();
      
      
      let filteredClubs = allClubs.filter(club => {
        const days = club.days || (club.day ? [club.day] : []);
        return club.name.toLowerCase().includes(filterLower) ||
          club.room.toLowerCase().includes(filterLower) ||
          days.some(d => d.toLowerCase().includes(filterLower));
      });
      
      
      filteredClubs.sort((a, b) => {
        const aSelected = selectedClubs.includes(a.id);
        const bSelected = selectedClubs.includes(b.id);
        if (aSelected && !bSelected) return -1;
        if (!aSelected && bSelected) return 1;
        return a.name.localeCompare(b.name);
      });
      
      if (filteredClubs.length === 0) {
        container.innerHTML = '<p class="no-clubs-message">No clubs found</p>';
        return;
      }
      
      let html = '';
      filteredClubs.forEach(club => {
        const isSelected = selectedClubs.includes(club.id);
        const timeStr = formatClubTime(club);
        const freqLabel = getFrequencyLabel(club.frequency);
        
        html += `
          <div class="club-item ${isSelected ? 'selected' : ''}" data-id="${club.id}">
            <input type="checkbox" class="club-checkbox" data-id="${club.id}" ${isSelected ? 'checked' : ''}>
            <div class="club-info">
              <div class="club-name">${club.name}</div>
              <div class="club-details">${formatClubDays(club)}${freqLabel} • ${timeStr} • Room ${club.room}</div>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
      
      
      container.querySelectorAll('.club-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.type !== 'checkbox') {
            const checkbox = item.querySelector('.club-checkbox');
            checkbox.checked = !checkbox.checked;
            toggleClub(item.dataset.id, checkbox.checked);
          }
        });
      });
      
      container.querySelectorAll('.club-checkbox').forEach(checkbox => {
        checkbox.addEventListener('change', (e) => {
          toggleClub(e.target.dataset.id, e.target.checked);
          e.stopPropagation();
        });
      });
      
      updateSelectedCount();
    }
    
    
    function toggleClub(clubId, isSelected) {
      if (isSelected && !selectedClubs.includes(clubId)) {
        selectedClubs.push(clubId);
      } else if (!isSelected) {
        selectedClubs = selectedClubs.filter(id => id !== clubId);
      }
      
      localStorage.setItem('selectedClubs', JSON.stringify(selectedClubs));
      
      
      const item = document.querySelector(`.club-item[data-id="${clubId}"]`);
      if (item) {
        item.classList.toggle('selected', isSelected);
      }
      
      updateSelectedCount();
    }
    
    
    function updateSelectedCount() {
      const count = selectedClubs.length;
      document.getElementById('selectedCount').textContent = 
        count === 0 ? 'No clubs selected' : 
        count === 1 ? '1 club selected' : 
        `${count} clubs selected`;
    }
    
    
    function init() {
      
      const clubsEnabled = localStorage.getItem('clubsEnabled');
      const isEnabled = clubsEnabled !== 'false'; 
      
      document.getElementById('clubsToggle').checked = isEnabled;
      document.getElementById('clubsContent').classList.toggle('enabled', isEnabled);
      
      
      const saved = localStorage.getItem('selectedClubs');
      if (saved) {
        try {
          selectedClubs = JSON.parse(saved);
        } catch (e) {
          selectedClubs = [];
        }
      }
      
      
      document.getElementById('clubsToggle').addEventListener('change', (e) => {
        const enabled = e.target.checked;
        localStorage.setItem('clubsEnabled', enabled.toString());
        document.getElementById('clubsContent').classList.toggle('enabled', enabled);
      });
      
      
      document.getElementById('clubSearch').addEventListener('input', (e) => {
        renderClubsList(e.target.value);
      });
      
      
      document.getElementById('selectAllBtn').addEventListener('click', () => {
        selectedClubs = allClubs.map(c => c.id);
        localStorage.setItem('selectedClubs', JSON.stringify(selectedClubs));
        renderClubsList(document.getElementById('clubSearch').value);
      });
      
      
      document.getElementById('deselectAllBtn').addEventListener('click', () => {
        selectedClubs = [];
        localStorage.setItem('selectedClubs', JSON.stringify(selectedClubs));
        renderClubsList(document.getElementById('clubSearch').value);
      });
      
      
      loadClubs();
    }
    
    checkSetupComplete();
    loadThemeOnPage();
    init();
  </script>
</body>
</html>
