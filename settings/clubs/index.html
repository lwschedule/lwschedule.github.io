<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clubs - LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <style>
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: var(--card-dark);
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .toggle-label {
      font-size: 1.05em;
      font-weight: 600;
    }
    .toggle-switch {
      position: relative;
      width: 60px;
      height: 32px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ff3b30; transition: .4s; border-radius: 34px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background: #34c759;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(28px);
    }
    .clubs-content {
      display: none;
    }
    .clubs-content.enabled {
      display: block;
    }
    .search-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 1em;
      border: 2px solid var(--primary);
      border-radius: 10px;
      background: var(--card-dark);
      color: var(--text-light);
      outline: none;
      transition: all 0.3s;
      margin-bottom: 15px;
    }
    .search-input:focus {
      box-shadow: 0 0 10px rgba(75, 46, 131, 0.5);
    }
    .search-input::placeholder {
      color: #888;
    }
    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .action-btn {
      flex: 1;
      padding: 10px 14px;
      font-size: 0.9em;
      font-weight: 600;
      border: 2px solid var(--primary);
      border-radius: 10px;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s;
    }
    .action-btn:hover {
      background: var(--primary);
    }
    .clubs-results {
      background: var(--card-dark);
      border-radius: 12px;
      max-height: 260px;
      overflow-y: auto;
      margin-bottom: 20px;
      border: 1px solid var(--primary-light);
    }
    .club-result {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border: none;
      border-bottom: 1px solid var(--primary-light);
      background: transparent;
      color: var(--text-light);
      text-align: left;
      cursor: pointer;
      font-size: 0.92em;
    }
    .club-result:last-child {
      border-bottom: none;
    }
    .club-result:hover {
      background: rgba(75, 46, 131, 0.2);
    }
    .club-result.added,
    .club-result:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      background: rgba(60, 37, 105, 0.25);
    }
    .result-tag {
      font-size: 0.75em;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--primary);
      color: #bfaee8;
      margin-left: 10px;
      white-space: nowrap;
      min-width: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .result-tag-icon {
      width: 12px;
      height: 12px;
      display: block;
      filter: brightness(0) saturate(100%) invert(83%) sepia(8%) saturate(1250%) hue-rotate(214deg) brightness(93%) contrast(93%);
    }
    .slots-container {
      background: var(--card-dark);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid var(--primary-light);
    }
    .slot-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .slot-row:last-child {
      margin-bottom: 0;
    }
    .slot-card {
      flex: 1;
      background: #141414;
      border: 1px solid var(--primary-light);
      border-radius: 10px;
      padding: 10px 12px;
      min-height: 62px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }
    .slot-value {
      font-size: 0.92em;
      font-weight: 600;
      line-height: 1.3;
    }
    .slot-clear {
      margin-top: 2px;
      width: fit-content;
      border: 1px solid var(--primary-light);
      background: transparent;
      color: #b7b7b7;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.72em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      min-height: 22px;
    }
    .slot-clear:hover {
      color: white;
      border-color: #7b7b7b;
    }
    .slot-clear-icon {
      width: 12px;
      height: 12px;
      display: block;
      filter: brightness(0) saturate(100%) invert(77%) sepia(1%) saturate(8%) hue-rotate(316deg) brightness(92%) contrast(89%);
    }
    .clubs-count {
      text-align: center;
      font-size: 0.9em;
      color: #aaa;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  
  <div class="pageContainer">
    <a href="/settings" class="icon-back-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
    <h2>Clubs</h2>

    <div class="toggle-container">
      <span class="toggle-label">Clubs</span>
      <label class="toggle-switch">
        <input type="checkbox" id="clubsToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>

        <div class="clubs-content" id="clubsContent">
      <input type="text" id="clubSearch" class="search-input" placeholder="Search clubs...">
      <div class="button-row">
        <button type="button" class="action-btn" id="clearClubsBtn">Clear All Clubs</button>
      </div>
      
      <div class="clubs-results" id="clubResults"></div>

      <div class="slots-container" id="selectedClubsList"></div>
      <p class="clubs-count" id="selectedCount">0 clubs selected</p>
      <button type="button" class="resetBtn" id="resetClubsBtn">Reset Clubs to Default</button>
    </div>
  </div>

  <script src="/common.js"></script>
  <script>
    let allClubs = [];
    let selectedClubs = [];

    function escapeHtml(text) {
      if (!text) return '';
      return text.toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadClubs() {
      try {
        const response = await fetch('/data/clubs.json');
        const data = await response.json();
        allClubs = data.clubs;
        renderClubResults();
        renderSelectedList();
      } catch (error) {
        console.error('Error loading clubs:', error);
        document.getElementById('clubResults').innerHTML = '<p style="text-align:center; padding: 26px; color: #888;">Error loading clubs</p>';
      }
    }

    function formatClubDays(club) {
      const days = club.days || (club.day ? [club.day] : []);
      return days.join(', ');
    }

    function getFrequencyLabel(frequency) {
      switch(frequency) {
        case 'weekly': return '';
        case 'every-other': return ' (Every Other)';
        case 'biweekly': return ' (Biweekly)';
        case 'last-of-month': return ' (Last of Month)';
        case 'monthly': return ' (Monthly)';
        case 'alternating': return ' (Alternating)';
        default: return '';
      }
    }

    function saveSelected() {
      localStorage.setItem('selectedClubs', JSON.stringify(selectedClubs));
    }

    function updateSelectedCount() {
      const count = selectedClubs.length;
      document.getElementById('selectedCount').textContent = 
        count === 0 ? 'No clubs selected' : 
        count === 1 ? '1 club selected' : 
        `${count} clubs selected`;
        
      const listEl = document.getElementById('selectedClubsList');
      if (count === 0) {
        listEl.style.display = 'none';
      } else {
        listEl.style.display = 'block';
      }
    }

    function renderClubResults(filter = '') {
      const resultsEl = document.getElementById('clubResults');
      const filterLower = filter.toLowerCase();

      let filteredClubs = allClubs.filter(club => {
        const days = club.days || (club.day ? [club.day] : []);
        return club.name.toLowerCase().includes(filterLower) ||
          club.room.toLowerCase().includes(filterLower) ||
          days.some(d => d.toLowerCase().includes(filterLower));
      });

      const selectedSet = new Set(selectedClubs);

      filteredClubs.sort((a, b) => {
        const aAdded = selectedSet.has(a.id);
        const bAdded = selectedSet.has(b.id);
        if (aAdded && !bAdded) return -1;
        if (!aAdded && bAdded) return 1;
        return a.name.localeCompare(b.name);
      });

      if (filteredClubs.length === 0) {
        resultsEl.innerHTML = '<p style="text-align:center; padding: 26px; color: #888;">No clubs found</p>';
        return;
      }

      let html = '';
      filteredClubs.forEach(club => {
        const isAdded = selectedSet.has(club.id);
        html += `<button type="button" class="club-result ${isAdded ? 'added' : ''}" data-id="${escapeHtml(club.id)}" ${isAdded ? 'disabled' : ''}>
          <span>${escapeHtml(club.name)}</span>
          <span class="result-tag">${isAdded ? 'Added' : '<img src="/icons/src/plus.svg" class="result-tag-icon" alt="">'}</span>
        </button>`;
      });
      resultsEl.innerHTML = html;

      resultsEl.querySelectorAll('.club-result:not(.added)').forEach(btn => {
        btn.addEventListener('click', () => {
          const clubId = btn.dataset.id;
          addClub(clubId);
        });
      });
    }

    function renderSelectedList() {
      const listEl = document.getElementById('selectedClubsList');
      let html = '';

      const selectedClubObjs = selectedClubs.map(id => allClubs.find(c => c.id === id)).filter(Boolean);
      selectedClubObjs.sort((a, b) => a.name.localeCompare(b.name));

      selectedClubs = selectedClubObjs.map(c => c.id);
      saveSelected();

      selectedClubObjs.forEach(club => {
        html += `<div class="slot-row">
          <div class="slot-card">
            <div class="slot-value">${escapeHtml(club.name)}</div>
            <button type="button" class="slot-clear" data-id="${escapeHtml(club.id)}" aria-label="Remove ${escapeHtml(club.name)}"><img src="/icons/src/minus.svg" class="slot-clear-icon" alt=""></button>
          </div>
        </div>`;
      });

      listEl.innerHTML = html;      listEl.querySelectorAll('.slot-clear').forEach(btn => {
        btn.addEventListener('click', () => {
          const clubId = btn.dataset.id;
          selectedClubs = selectedClubs.filter(id => id !== clubId);
          saveSelected();
          renderSelectedList();
          renderClubResults(document.getElementById('clubSearch').value);
        });
      });

      updateSelectedCount();
    }

    function addClub(clubId) {
      if (!selectedClubs.includes(clubId)) {
        selectedClubs.push(clubId);
        saveSelected();
        renderSelectedList();
        renderClubResults(document.getElementById('clubSearch').value);
      }
    }

    function init() {
      const clubsEnabled = localStorage.getItem('clubsEnabled');
      const isEnabled = clubsEnabled !== 'false';
      const clubsToggle = document.getElementById('clubsToggle');
      const clubsContent = document.getElementById('clubsContent');

      clubsToggle.checked = isEnabled;
      clubsContent.classList.toggle('enabled', isEnabled);

      clubsToggle.addEventListener('change', (e) => {
        const enabled = e.target.checked;
        localStorage.setItem('clubsEnabled', enabled.toString());
        clubsContent.classList.toggle('enabled', enabled);
      });

      const saved = localStorage.getItem('selectedClubs');
      if (saved) {
        try {
          selectedClubs = JSON.parse(saved);
        } catch (e) {
          selectedClubs = [];
        }
      }

      document.getElementById('clubSearch').addEventListener('input', (e) => {
        renderClubResults(e.target.value);
      });

      document.getElementById('clearClubsBtn').addEventListener('click', () => {
        selectedClubs = [];
        saveSelected();
        renderSelectedList();
        renderClubResults(document.getElementById('clubSearch').value);
      });

        document.getElementById('resetClubsBtn').addEventListener('click', () => {
          selectedClubs = [];
          saveSelected();
          localStorage.setItem('clubsEnabled', 'false');
          document.getElementById('clubsToggle').checked = false;
          document.getElementById('clubsContent').classList.remove('enabled');
          renderSelectedList();
          renderClubResults(document.getElementById('clubSearch').value);
        });
      
      loadClubs();
    }

    checkSetupComplete();
    init();
  </script>
</body>
</html>
