<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunch Preferences - LW Schedule</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <style>

.pageContainer { max-width: 650px; margin: 0 auto; padding: 80px 0 20px 0; }
.settingsRow { padding: 0; margin: 0 0 15px 0; background: transparent; }
.settingsRow label { display: block; margin-bottom: 8px; font-weight: 700; }
.lunchButtons { display: flex; gap: 10px; justify-content: center; }
.lunchBtn { flex: 1; background: var(--card-dark); color: var(--text-light); border: 2px solid var(--primary-light); padding: 12px 24px; font-size: 1em; border-radius: 12px; cursor: pointer; transition: all 0.3s; font-weight: 700; }
.lunchBtn:hover { background: var(--primary-light); color: white; transform: scale(1.05); }
.lunchBtn.selected { background: var(--primary-light); color: white; box-shadow: var(--glow); }
.lunchBtn:disabled { opacity: 1; cursor: default; }
.resetBtn { display: block; width: 100%; background: var(--primary); color: white; border: none; padding: 12px 30px; font-size: 1em; border-radius: 12px; cursor: pointer; transition: all 0.3s; font-weight: 700; margin-top: 20px; text-decoration: none; text-align: center; }
.resetBtn:hover { background: #9d182e; transform: scale(1.05); }
@media (max-width: 600px) {
    .pageContainer { padding: 20px 0 0 0; }
}
  </style>
</head>
<body>
  
  <div class="pageContainer">
    <a href="/settings" class="icon-back-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
    <h2>Lunch Preferences</h2>
    <div id="normalLunches">
      <div class="settingsRow">
        <label>Period 3 Lunch <small>(Mon/Fri & most special schedules)</small>:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-period="3" data-lunch="A">A Lunch</button>
          <button class="lunchBtn" data-period="3" data-lunch="B">B Lunch</button>
        </div>
      </div>
      <div class="settingsRow">
        <label>Period 4 Lunch <small>(Tue/Thu & most special schedules)</small>:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-period="4" data-lunch="A">A Lunch</button>
          <button class="lunchBtn" data-period="4" data-lunch="B">B Lunch</button>
        </div>
      </div>
      <div class="settingsRow">
        <label>Wednesday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn selected" disabled>All School Lunch</button>
        </div>
      </div>
    </div>
    <button class="resetBtn" id="resetLunchBtn">Reset Lunches</button>
  </div>
  <script src="/common-core.js"></script>
  <script>
    if (window.location.pathname.startsWith('/settings')) {
      window.location.replace('/profile');
    }
  </script>
  <script>
    (async () => {
      if (typeof window.loadCommon === 'function') {
        try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
      }
const lunchPrefs = getLunchPrefs();
function updateUI() { updateLunchBtns(lunchPrefs); }
initLunchBtnListeners(lunchPrefs, p => setLunchPrefs(p));

document.getElementById('resetLunchBtn').addEventListener('click', () => {
  Object.assign(lunchPrefs, getDefaultLunchPrefs());
  setLunchPrefs(lunchPrefs);
  updateUI();
});
checkSetupComplete();
updateUI();
    })();
</script>
</body>
</html>
