<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunch Preferences - LW Schedule</title>
  <link rel="preconnect" href="https:

  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <style>
@font-face {
  font-family: 'SF Pro Rounded';
  src: url('/SF-Pro-Rounded-Regular.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
}

:root {
  --primary: #3c2569;
  --primary-light: #553f8f;
  --text-light: #e8e8e8;
  --bg-dark: #0b0b0b;
  --card-dark: #1e1e1e;
  --glow: 0 0 12px rgba(85, 63, 143, 0.8);
}
body.theme-purple { --primary: #3c2569; --primary-light: #553f8f; --glow: 0 0 12px rgba(85, 63, 143, 0.8); }
body.theme-red { --primary: #9d182e; --primary-light: #b82e38; --glow: 0 0 12px rgba(184, 46, 56, 0.8); }
body.theme-orange { --primary: #a94300; --primary-light: #b8651b; --glow: 0 0 12px rgba(184, 101, 27, 0.8); }
body.theme-yellow { --primary: #9b7e00; --primary-light: #c19d0c; --glow: 0 0 12px rgba(193, 157, 12, 0.8); }
body.theme-green { --primary: #1f8b4d; --primary-light: #25a35a; --glow: 0 0 12px rgba(37, 163, 90, 0.8); }
body.theme-blue { --primary: #216694; --primary-light: #2a7aaf; --glow: 0 0 12px rgba(42, 122, 175, 0.8); }
body.theme-indigo { --primary: #324191; --primary-light: #4a569a; --glow: 0 0 12px rgba(74, 86, 154, 0.8); }
body.theme-pink { --primary: #9b1349; --primary-light: #ba184f; --glow: 0 0 12px rgba(186, 24, 79, 0.8); }
* { font-family: 'SF Pro Rounded', sans-serif; box-sizing: border-box; }
body { background: var(--bg-dark); color: var(--text-light); margin: 0; padding: 20px; scrollbar-width: none; -ms-overflow-style: none; transition: all 0.3s ease; padding-bottom: 100px; }
body::-webkit-scrollbar { display: none; }
@keyframes gradientShift3 { 0% { background-position: 0% 0%; } 25% { background-position: 100% 0%; } 50% { background-position: 100% 100%; } 75% { background-position: 0% 100%; } 100% { background-position: 0% 0%; } }
h1, h2, h3 { text-align: center; color: white; }
.backBtn { position: fixed; top: 20px; left: 20px; width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), var(--primary-light), var(--primary)) !important; background-size: 200% 200% !important; animation: gradientShift3 8s ease infinite !important; color: transparent; border: none; padding: 0; font-size: 0; border-radius: 50%; cursor: pointer; box-shadow: var(--glow); transition: all 0.3s; text-decoration: none; z-index: 1000; display: flex; align-items: center; justify-content: center; }
.backBtn::before { content: '←'; color: white; font-size: 1.5rem; font-weight: 700; line-height: 1; }
.backBtn:hover { transform: scale(1.1); }
.pageContainer { max-width: 650px; margin: 0 auto; padding: 80px 0 20px 0; }
.settingsRow { padding: 0; margin: 0 0 15px 0; background: transparent; }
.settingsRow label { display: block; margin-bottom: 8px; font-weight: 700; }
.lunchButtons { display: flex; gap: 10px; justify-content: center; }
.lunchBtn { flex: 1; background: var(--card-dark); color: var(--text-light); border: 2px solid var(--primary-light); padding: 12px 24px; font-size: 1em; border-radius: 12px; cursor: pointer; transition: all 0.3s; font-weight: 700; }
.lunchBtn:hover { background: var(--primary-light); color: white; transform: scale(1.05); }
.lunchBtn.selected { background: var(--primary-light); color: white; box-shadow: var(--glow); }
.lunchBtn:disabled { opacity: 1; cursor: default; }
.resetBtn { display: block; width: 100%; background: #444444; color: white; border: none; padding: 12px 30px; font-size: 1em; border-radius: 12px; cursor: pointer; transition: all 0.3s; font-weight: 700; margin-top: 20px; text-decoration: none; text-align: center; }
.resetBtn:hover { background: #9d182e; transform: scale(1.05); }
@media (max-width: 600px) {
  .backBtn { position: fixed; top: 10px; left: 10px; width: 45px; height: 45px; }
  .pageContainer { padding: 20px 0 0 0; }
}
  </style>
</head>
<body>
  <a href="/settings" class="backBtn">← Back</a>
  <div class="pageContainer">
    <h2 id="pageTitle">Lunch Preferences</h2>
    <div id="normalLunches">
      <div class="settingsRow">
        <label>Monday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-day="Monday" data-lunch="A">A Lunch<br><small>Based on Period 3</small></button>
          <button class="lunchBtn" data-day="Monday" data-lunch="B">B Lunch<br><small>Based on Period 3</small></button>
        </div>
      </div>
      <div class="settingsRow">
        <label>Tuesday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-day="Tuesday" data-lunch="A">A Lunch<br><small>Based on Period 4</small></button>
          <button class="lunchBtn" data-day="Tuesday" data-lunch="B">B Lunch<br><small>Based on Period 4</small></button>
        </div>
      </div>
      <div class="settingsRow">
        <label>Wednesday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn selected" disabled>All School Lunch</button>
        </div>
      </div>
      <div class="settingsRow">
        <label>Thursday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-day="Thursday" data-lunch="A">A Lunch<br><small>Based on Period 4</small></button>
          <button class="lunchBtn" data-day="Thursday" data-lunch="B">B Lunch<br><small>Based on Period 4</small></button>
        </div>
      </div>
      <div class="settingsRow">
        <label>Friday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-day="Friday" data-lunch="A">A Lunch<br><small>Based on Period 3</small></button>
          <button class="lunchBtn" data-day="Friday" data-lunch="B">B Lunch<br><small>Based on Period 3</small></button>
        </div>
      </div>
    </div>
    <div id="finalsLunches" style="display: none;">
      <div class="settingsRow" id="mondayLunchRow" style="display: none;">
        <label>Monday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-day="Monday" data-lunch="A">A Lunch<br><small>Based on Period 3</small></button>
          <button class="lunchBtn" data-day="Monday" data-lunch="B">B Lunch<br><small>Based on Period 3</small></button>
        </div>
      </div>
      <div class="settingsRow">
        <label>Tuesday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-day="Tuesday" data-lunch="A">A Lunch<br><small>Based on Period 4</small></button>
          <button class="lunchBtn" data-day="Tuesday" data-lunch="B">B Lunch<br><small>Based on Period 4</small></button>
        </div>
      </div>
      <div class="settingsRow" id="wednesdayLunchRow" style="display: none;">
        <label>Wednesday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn selected" disabled>All School Lunch</button>
        </div>
      </div>
      <div class="settingsRow" id="thursdayLunchRow">
        <label>Thursday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-day="Thursday" data-lunch="A">A Lunch<br><small>Based on Period 3</small></button>
          <button class="lunchBtn" data-day="Thursday" data-lunch="B">B Lunch<br><small>Based on Period 3</small></button>
        </div>
      </div>
      <div class="settingsRow" id="fridayLunchRow">
        <label>Friday Lunch:</label>
        <div class="lunchButtons">
          <button class="lunchBtn" data-day="Friday" data-lunch="A">A Lunch<br><small>Based on Period 4</small></button>
          <button class="lunchBtn" data-day="Friday" data-lunch="B">B Lunch<br><small>Based on Period 4</small></button>
        </div>
      </div>
    </div>
    <button class="resetBtn" id="resetLunchBtn">Reset All Lunches</button>
  </div>
  <script>
function checkSetupComplete() {
  const theme = localStorage.getItem('theme');
  const gradient = localStorage.getItem('gradient');
  const lunch = localStorage.getItem('lunchPreferences');
  const packup = localStorage.getItem('pack-up-time');
  const setupComplete = localStorage.getItem('setup-complete');
if (!setupComplete && !window.location.pathname.includes('/setup')) {
if (!theme || !gradient || !lunch || packup === null) {
window.location.href = '/setup';
return false;
}
}
return true;
}
const urlParams = new URLSearchParams(window.location.search);
const isFinals = urlParams.has('finals');
let lunchPrefs;
if (isFinals) {
  document.getElementById('pageTitle').textContent = 'Finals Week Lunch Preferences';
  document.getElementById('normalLunches').style.display = 'none';
  document.getElementById('finalsLunches').style.display = 'block';
  document.getElementById('mondayLunchRow').style.display = 'none';
  document.getElementById('wednesdayLunchRow').style.display = 'none';
  document.getElementById('thursdayLunchRow').style.display = 'block';
  document.getElementById('fridayLunchRow').style.display = 'block';
  lunchPrefs = JSON.parse(localStorage.getItem('finalsLunchPreferences') || '{"Tuesday":"A","Thursday":"A","Friday":"A"}');
} else {
  lunchPrefs = JSON.parse(localStorage.getItem('lunchPreferences') || '{"Monday":"A","Tuesday":"A","Wednesday":"All","Thursday":"A","Friday":"A"}');
}
function updateUI() {
document.querySelectorAll('.lunchBtn[data-day]').forEach(btn => {
const day = btn.dataset.day;
const lunch = btn.dataset.lunch;
btn.classList.toggle('selected', lunchPrefs[day] === lunch);
});
}
document.querySelectorAll('.lunchBtn[data-day]').forEach(btn => {
btn.addEventListener('click', () => {
const day = btn.dataset.day;
const lunch = btn.dataset.lunch;
  lunchPrefs[day] = lunch;
  if (isFinals) localStorage.setItem('finalsLunchPreferences', JSON.stringify(lunchPrefs));
  else localStorage.setItem('lunchPreferences', JSON.stringify(lunchPrefs));
updateUI();
});
});
document.getElementById('resetLunchBtn').addEventListener('click', () => {
let msg = 'Reset all lunch preferences to A Lunch?';
  if (isFinals) msg = 'Reset all finals lunch preferences to A Lunch?';
if (confirm(msg)) {
if (isFinals) {
  lunchPrefs = {Tuesday:'A',Thursday:'A',Friday:'A'};
  localStorage.setItem('finalsLunchPreferences', JSON.stringify(lunchPrefs));
} else {
  lunchPrefs = {Monday:'A',Tuesday:'A',Wednesday:'All',Thursday:'A',Friday:'A'};
  localStorage.setItem('lunchPreferences', JSON.stringify(lunchPrefs));
}
updateUI();
}
});
function loadThemeOnPage() {
  const theme = localStorage.getItem('theme') || 'purple';
  document.body.className = `theme-${theme}`;
}
checkSetupComplete();
loadThemeOnPage();
updateUI();
</script>
</body>
</html>
