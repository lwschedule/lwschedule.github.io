<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What’s New</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <script src="/loader.js"></script>
  <style>
    .whatsnewContent { padding: 20px; max-width: 760px; margin: 0 auto; }
    .whatsnewSection { background: var(--card-dark); border-radius: 12px; padding: 18px; margin-bottom: 18px; }
    .whatsnewContent h3 { color: white; margin-top: 0; margin-bottom: 10px; }
    .whatsnewContent p { margin: 10px 0; line-height: 1.6; }
    .whatsnewContent a { color: white; text-decoration: none; font-weight: 700; }
    .whatsnewContent a:hover { text-decoration: underline; }
    .versionBadge { display: inline-block; background: var(--primary) !important; color: white; padding: 8px 20px; border-radius: 20px; font-size: 1.2em; font-weight: 700; margin: 6px 0 0; box-shadow: var(--glow); }
    .whatsnew-header { text-align: center; }

    .changelog-list { display: flex; flex-direction: column; gap: 6px; }
    .changelog-month-heading { text-align: left; font-size: 0.95em; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.65; font-weight: 700; margin: 18px 0 4px; padding: 0 4px; }
    .changelog-month-heading:first-child { margin-top: 4px; }
    .changelog-item {
      display: grid;
      grid-template-columns: 92px 1fr;
      align-items: center;
      gap: 12px;
      background: var(--card-dark);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .version-pill {
      display: inline-block;
      font-family: 'SF Pro Display', sans-serif;
      font-size: 0.78em;
      font-weight: 700;
      padding: 4px 8px;
      background: var(--primary-light);
      color: white;
      border-radius: 8px;
      letter-spacing: 0.02em;
      white-space: nowrap;
      text-align: center;
    }
    
    .changelog-item-body { min-width: 0; }
    
    .commit-meta { display: flex; gap: 10px; align-items: center; margin-top: 2px; font-size: 0.8em; opacity: 0.7; }

    @media (max-width: 460px) {
      .changelog-item { grid-template-columns: 80px 1fr; padding: 8px 10px; gap: 10px; }
      .version-pill { font-size: 0.72em; padding: 3px 6px; }
      
    }
  </style>
</head>
<body>
  <div class="pageContainer">
    <h2>What’s New</h2>
    <div class="whatsnewContent">

      <div class="settingsRow">
        <a class="mainBtn" href="https://github.com/lwschedule/lwschedule.github.io/issues" target="_blank" rel="noopener">Coming Soon</a>
      </div>

      <div class="whatsnewSection">
<div class="changelog-list" id="changelogList"></div>
      </div>
    </div>
  </div>
  <script src="/common-core.js"></script>
  <script>
    (async () => {
      if (typeof window.loadCommon === 'function') {
        try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
      }
      checkSetupComplete();
      
      // Load and render changelog from JSON
      try {
        const res = await fetch('/data/changelog.json');
        const entries = await res.json();
        renderChangelog(entries);
      } catch (err) {
        console.error('Failed to load changelog:', err);
        document.getElementById('changelogList').innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">Could not load version history.</p>';
      }
      
      if (typeof window.hideLoader === 'function') window.hideLoader();
    })();

    function renderChangelog(entries) {
      const container = document.getElementById('changelogList');
      
      // Group entries by month-year
      const groups = [];
      let currentMonth = null;
      let currentGroup = [];
      
      for (const entry of entries) {
        const parts = entry.date.split(' ');
        const monthName = parts[0];
        const year = parts[2];
        const monthKey = monthName + ' ' + year;
        
        if (monthKey !== currentMonth) {
          if (currentGroup.length > 0) {
            groups.push({ month: currentMonth, items: currentGroup });
          }
          currentMonth = monthKey;
          currentGroup = [];
        }
        currentGroup.push(entry);
      }
      if (currentGroup.length > 0) {
        groups.push({ month: currentMonth, items: currentGroup });
      }
      
      // Render
      let html = '';
      let isFirst = true;
      
      for (const group of groups) {
        html += '<div class="changelog-month-heading">' + group.month + '</div>\n';
        for (const entry of group.items) {
          let anchored = isFirst ? ' changelog-row-anchored' : '';
          html += '<div class="changelog-item' + anchored + '"><span class="version-pill">' + entry.version + '</span><div class="changelog-item-body"><div class="commit-title">' + entry.title + '</div><div class="commit-meta"><span class="commit-date">' + entry.date + '</span></div></div></div>\n';
          isFirst = false;
        }
      }
      
      container.innerHTML = html;
    }
  </script>
</body>
</html>
