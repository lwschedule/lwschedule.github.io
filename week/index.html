<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>This Week's Schedule - LW Schedule</title>
  <link rel="preconnect" href="https:

  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4b2e83">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  <a href="/" class="backBtn">← Back</a>
  <div class="pageContainer">
    <h2>This Week's Schedule</h2>
    <div id="weekContent">
      <p>Loading this week's schedule...</p>
    </div>
  </div>
  <script src="/common.js"></script>
  <script>
    (async () => {
      await initApp();

      async function fetchSpecialSchedule() {
        const response = await fetch('/app/data/schedules.json');
        const schedules = await response.json();
        const today = new Date();

        for (const schedule of schedules) {
          const startDate = new Date(schedule.startDate);
          const endDate = new Date(schedule.endDate);
          if (today >= startDate && today <= endDate) {
            return schedule;
          }
        }
        return null;
      }

      async function updateWeekSchedule() {
        const specialSchedule = await fetchSpecialSchedule();
        const weekContent = document.getElementById('weekContent');

        if (specialSchedule) {
          weekContent.innerHTML = `<h3>Special Schedule: ${specialSchedule.name}</h3>`;
          weekContent.innerHTML += `<p>${specialSchedule.description}</p>`;
        } else {
          weekContent.innerHTML = '<p>No special schedules this week.</p>';
        }
      }

      updateWeekSchedule();
    })();
  </script>
</body>
</html>
