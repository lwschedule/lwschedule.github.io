<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>This Week's Schedule - LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  
  <div class="pageContainer">
    <h2>This Week's Schedule</h2>
    <div id="weekContent">
      <p>Loading this week's schedule...</p>
    </div>
  </div>
  <script src="/common-core.js"></script>
  <script>
    (async () => {
      if (typeof window.loadModules === 'function') {
        try { await window.loadModules(['navigation', 'data', 'schedule', 'clubs', 'calendar']); } catch (err) { console.error('Failed to load modules:', err); }
      }
      if (typeof initApp === 'function') await initApp();
      updateWeekSchedule();
    })();
  </script>
</body>
</html>
