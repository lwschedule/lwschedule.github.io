<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tuesday - LW Schedule</title>
  <link rel="preconnect" href="https:

  <link href="https:
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f0518">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  
  <div class="pageContainer">
    <a href="/week" style="display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--card-dark); border: 1px solid var(--primary-light); color: var(--text-light); text-decoration: none; margin-bottom: 15px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='none'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
    <h2 id="dayTitle">Tuesday's Schedule</h2>
    <div id="dayContent">
      <p>Loading schedule...</p>
    </div>
  </div>
  <script src="/common.js"></script>
  <script>
    (async () => {
      await initApp();
      const scheduleEl = document.getElementById('dayContent');
      if (!scheduleEl) return;

      const path = window.location.pathname;
      const dayMatch = path.match(/\/week\/(\w+)/);
      if (!dayMatch) return;
      const dayName = dayMatch[1].charAt(0).toUpperCase() + dayMatch[1].slice(1);

      const urlParams = new URLSearchParams(window.location.search);
      const dateParam = urlParams.get('date');
      let dayDate;
      if (dateParam) {
        dayDate = new Date(dateParam);
      } else {
        const now = new Date();
        const currentDayOfWeek = now.getDay();
        let diff = currentDayOfWeek === 0 ? -6 : 1 - currentDayOfWeek;
        if (currentDayOfWeek === 6 || currentDayOfWeek === 0) {
          diff += 7;
        } else {
          const thisFriday = new Date(now);
          thisFriday.setDate(now.getDate() + (5 - currentDayOfWeek));
          const fridayHoliday = getHolidayForDate(thisFriday);
          if (fridayHoliday) {
            diff += 7;
          }
        }
        const monday = new Date(now);
        monday.setDate(now.getDate() + diff);
        const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
        const dayIndex = weekDays.indexOf(dayName);
        if (dayIndex === -1) return;
        dayDate = new Date(monday);
        dayDate.setDate(monday.getDate() + dayIndex);
      }

      const holidayName = getHolidayForDate(dayDate);
      if (holidayName) {
        scheduleEl.innerHTML = `<div class="noSchoolMessage"><h3>${holidayName}</h3><p>No school today!</p></div>`;
        return;
      }

      const schedules = getSchedules(dayDate);
      const schedule = schedules[dayName];
      let html = renderScheduleTable(schedule, null, true);
      
      
      const clubsHtml = renderClubsForDay(dayDate, true);
      if (clubsHtml) {
        html += clubsHtml;
      }
      
      scheduleEl.innerHTML = html;
    })();
  </script>
</body>
</html>
