<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
</head>
<body class="homePage">
  <div class="home-header-new">
    <div class="home-greeting-col">
      <h1 class="home-greeting-text" id="homeGreeting">Good evening, <span class="home-greeting-name" id="homeGreetingName">User</span>.</h1>
      <p class="home-greeting-sub">Here's what's coming up.</p>
    </div>
    <div class="home-date-col">
      <img src="/icons/src/calendar.svg" class="home-date-icon" alt="" aria-hidden="true">
      <div>
        <div class="home-date-day" id="homeDateDay"></div>
        <div class="home-date-full" id="homeDateFull"></div>
      </div>
    </div>
  </div>
  <div id="digitalClock">
    <div id="clockLabel">TIME REMAINING</div>
    <div id="clockDisplay">
      <div class="time-block" id="clockDisplay-days-block">
        <span id="clockDisplay-days" class="time-value">00</span>
        <span class="time-label">DAYS</span>
      </div>
      <div class="time-block" id="clockDisplay-hours-block">
        <span id="clockDisplay-hours" class="time-value">00</span>
        <span class="time-label">HOURS</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-minutes" class="time-value">00</span>
        <span class="time-label">MINUTES</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-seconds" class="time-value">00</span>
        <span class="time-label">SECONDS</span>
      </div>
    </div>
  </div>
  <div id="timer"></div>
  <section class="upcoming-section">
    <h2 class="upcoming-heading">Upcoming</h2>
    <div id="upcomingTiles" class="upcoming-tiles">
      <div class="upcoming-tile" id="upcomingTile1">
        <!-- Icon removed per request -->
        <div class="upcoming-tile-body">
          <div class="upcoming-tile-title" id="upcomingTile1Title">Loading...</div>
          <!-- Sub content removed per request -->
          <div class="upcoming-tile-countdown" id="upcomingTile1Countdown"></div>
        </div>
      </div>
      <div class="upcoming-tile" id="upcomingTile2">
        <!-- Icon removed per request -->
        <div class="upcoming-tile-body">
          <div class="upcoming-tile-title" id="upcomingTile2Title">Loading...</div>
          <!-- Sub content removed per request -->
          <div class="upcoming-tile-countdown" id="upcomingTile2Countdown"></div>
        </div>
      </div>
      <div class="upcoming-tile" id="upcomingTile3">
        <!-- Icon removed per request -->
        <div class="upcoming-tile-body">
          <div class="upcoming-tile-title" id="upcomingTile3Title">Loading...</div>
          <!-- Sub content removed per request -->
          <div class="upcoming-tile-countdown" id="upcomingTile3Countdown"></div>
        </div>
      </div>
    </div>
  </section>
  <div id="homeTicker" class="home-ticker" role="region" aria-label="Site messages">
    <div class="home-ticker-inner">
      <div class="home-ticker-viewport">
        <div id="homeTickerTrack" class="home-ticker-track" aria-live="polite"></div>
      </div>
      <button type="button" id="homeTickerPause" class="home-ticker-pause" aria-label="Pause ticker">
        <svg id="homeTickerPauseIcon" width="12" height="12" viewBox="0 0 12 12" fill="white">
          <rect x="2" y="1" width="3" height="10" rx="1"/>
          <rect x="7" y="1" width="3" height="10" rx="1"/>
        </svg>
      </button>
      <button type="button" id="homeTickerClose" class="home-ticker-close" aria-label="Dismiss ticker">&times;</button>
    </div>
  </div>
  <div id="homeTickerSpacer" aria-hidden="true"></div>

  <script src="/common-core.js"></script>
<script>
  // Dynamically load number-flow.js as an ES Module
  async function loadNumberFlow() {
    try {
      await import('/vendor/number-flow.js');
      if (!customElements.get('number-flow')) {
        console.warn('Number Flow loaded but custom element not defined.');
        return false;
      }
      return true;
    } catch (error) {
      console.warn('Failed to load Number Flow:', error);
      return false;
    }
  }

  async function initClockMorphs() {
    const loaded = await loadNumberFlow();
    if (!loaded) return;

    const fields = ['days', 'hours', 'minutes', 'seconds'];
    const morphs = {};
    for (const field of fields) {
      const span = document.getElementById(`clockDisplay-${field}`);
      if (!span) continue;
      const nf = document.createElement('number-flow');
      nf.update(0);
      span.textContent = '';
      span.appendChild(nf);
      morphs[field] = nf;
    }

    window.updateClockMorphs = (data) => {
      if (data.days !== undefined) morphs.days?.update(data.days ?? 0);
      if (data.hours !== undefined) morphs.hours?.update(data.hours ?? 0);
      morphs.minutes?.update(data.minutes ?? 0);
      morphs.seconds?.update(data.seconds ?? 0);
    };

    const timerEl = document.getElementById('timer');
    window.updateNextPeriodBlock = (text) => {
      if (timerEl) timerEl.textContent = text;
    };
  }
</script>
<script>
  (async () => {
    if (typeof window.loadCommon === 'function') {
      try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
    }
    await initClockMorphs();
    await initApp();
    checkSetupComplete();

    // Hide upcoming tiles when there is no data to display
    (function hideUnusedUpcomingTiles() {
      // Tile 2: Followed events
      try {
        const followed = typeof getProfileFollowedEvents === 'function' ? getProfileFollowedEvents() : [];
        if (!followed || followed.length === 0) {
          const tile2 = document.getElementById('upcomingTile2');
          if (tile2) tile2.remove();
        }
      } catch (e) { /* ignore */ }

      // If all tiles removed, remove the entire upcoming section
      try {
        const section = document.querySelector('.upcoming-section');
        if (section && !section.querySelector('.upcoming-tile')) {
          section.remove();
        }
      } catch (e) { /* ignore */ }

      // Tile 3: Academic quarters
      try {
        if (!academicTerms || !academicTerms.quarters || academicTerms.quarters.length === 0) {
          const tile3 = document.getElementById('upcomingTile3');
          if (tile3) tile3.remove();
        }
      } catch (e) { /* ignore */ }

      // Tile 1: Next school day / period
      try {
        const nextSchool = typeof getNextSchoolDayStartTime === 'function' ? getNextSchoolDayStartTime() : null;
        if (!nextSchool) {
          const tile1 = document.getElementById('upcomingTile1');
          if (tile1) tile1.remove();
        }
      } catch (e) { /* ignore */ }
    })();

    // Header greeting
    (function() {
      const hour = new Date().getHours();
      let greeting = 'Good morning';
      if (hour >= 12 && hour < 17) greeting = 'Good afternoon';
      else if (hour >= 17 && hour < 21) greeting = 'Good evening';
      else if (hour >= 21 || hour < 5) greeting = 'Good night';
      const name = getProfileName() || 'User';
      document.getElementById('homeGreeting').childNodes[0].textContent = greeting + ', ';
      document.getElementById('homeGreetingName').textContent = name;
      const now = new Date();
      document.getElementById('homeDateDay').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
      document.getElementById('homeDateFull').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    })();

    // Upcoming tile 3 — Quarter countdown
    (function() {
      if (!academicTerms || !academicTerms.quarters) return;
      const now = new Date();
      const current = academicTerms.quarters.find(q => now >= q.start && now <= q.end);
      const next = academicTerms.quarters.find(q => now < q.start);
      const term = current || next;
      if (!term) {
        document.getElementById('upcomingTile3Title').textContent = 'No upcoming quarter';
        window.__nextQuarterTarget = null;
        return;
      }
      const label = current ? 'End of ' + term.name : 'Start of ' + term.name;
      const target = current ? term.end : term.start;
      const diffMs = target - now;
      const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
      document.getElementById('upcomingTile3Title').textContent = label;
      document.getElementById('upcomingTile3Sub').textContent = diffDays + ' day' + (diffDays !== 1 ? 's' : '') + ' remaining';
      window.__nextQuarterTarget = target;
    })();

    // Upcoming tile 2 — Next followed event
    (async function() {
      try {
        const res = await fetch('/data/events.json');
        const data = await res.json();
        const all = [...(data.apTests || []), ...(data.standardizedTests || [])];
        const followed = typeof getProfileFollowedEvents === 'function' ? getProfileFollowedEvents() : [];
        const today = new Date(); today.setHours(0,0,0,0);
        const upcoming = all
          .filter(e => followed.includes(e.id))
          .map(e => ({ ...e, dateObj: new Date(e.date + 'T00:00:00') }))
          .filter(e => e.dateObj >= today)
          .sort((a,b) => a.dateObj - b.dateObj);
        if (!upcoming.length) {
          document.getElementById('upcomingTile2Title').textContent = 'Nothing coming soon!';
          document.getElementById('upcomingTile2Sub').textContent = 'Choose more events in your profile to see them here.';
          window.__nextEventDate = null;
        } else {
          const next = upcoming[0];
          document.getElementById('upcomingTile2Title').textContent = next.title;
          document.getElementById('upcomingTile2Sub').textContent = next.dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + (next.time ? ' · ' + next.time : '');
          window.__nextEventDate = next.dateObj;
        }
      } catch(e) { window.__nextEventDate = null; }
    })();

    // Upcoming tile 1 — Next period (update every second alongside the clock)
    function updateUpcomingTile1() {
      const text = document.getElementById('timer') ? document.getElementById('timer').textContent : '';
      const label = document.getElementById('clockLabel') ? document.getElementById('clockLabel').textContent : '';
      if (text) {
        document.getElementById('upcomingTile1Title').textContent = text;
        document.getElementById('upcomingTile1Sub').textContent = label;
      }
    }
    const origSetInterval = window.__tile1Interval;
    if (origSetInterval) clearInterval(origSetInterval);
    window.__tile1Interval = setInterval(updateUpcomingTile1, 1000);
    updateUpcomingTile1();

    updateClock();
    setInterval(updateClock, 1000);

    // Initialize countdowns for upcoming tiles using NumberFlow
    (function initUpcomingCountdowns() {
      // Helper to create a NumberFlow element inside a container
      function createNumberFlow(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return null;
        const nf = document.createElement('number-flow');
        nf.update(0);
        container.textContent = '';
        container.appendChild(nf);
        return nf;
      }

      // Tile 1: reuse same data as main clock morphs (days/hours/minutes/seconds)
      const tile1NF = createNumberFlow('upcomingTile1Countdown');
      // Tile 2: countdown to next followed event (if any)
      const tile2NF = createNumberFlow('upcomingTile2Countdown');
      // Tile 3: countdown to next quarter target (if any)
      const tile3NF = createNumberFlow('upcomingTile3Countdown');

      function updateCountdowns() {
        // Tile 1: display total seconds remaining until target (same as main clock)
        if (tile1NF && typeof window.updateClockMorphs === 'function') {
          // We can reuse the same data that updateClockMorphs receives.
          // Since we don't have direct access here, compute from clock display values.
          const days = parseInt(document.getElementById('clockDisplay-days')?.textContent || '0', 10) || 0;
          const hours = parseInt(document.getElementById('clockDisplay-hours')?.textContent || '0', 10) || 0;
          const minutes = parseInt(document.getElementById('clockDisplay-minutes')?.textContent || '0', 10) || 0;
          const seconds = parseInt(document.getElementById('clockDisplay-seconds')?.textContent || '0', 10) || 0;
          const totalSeconds = ((days * 24 + hours) * 60 + minutes) * 60 + seconds;
          tile1NF.update(totalSeconds);
        }

        // Tile 2: next event countdown (seconds remaining)
        if (tile2NF && window.__nextEventDate instanceof Date) {
          const diffMs = window.__nextEventDate - new Date();
          const secs = Math.max(0, Math.floor(diffMs / 1000));
          tile2NF.update(secs);
        }

        // Tile 3: next quarter countdown (days remaining, shown as whole days)
        if (tile3NF && window.__nextQuarterTarget instanceof Date) {
          const diffMs = window.__nextQuarterTarget - new Date();
          const days = Math.max(0, Math.ceil(diffMs / (1000 * 60 * 60 * 24)));
          tile3NF.update(days);
        }
      }

      // Update every second
      setInterval(updateCountdowns, 1000);
      // Initial call
      updateCountdowns();
    })();

    // Ticker
    try {
      const res = await fetch('/data/ticker-messages.json');
      const data = await res.json();
      const ticker = document.getElementById('homeTicker');
      const track = document.getElementById('homeTickerTrack');
      const closeBtn = document.getElementById('homeTickerClose');
      if (data.messages && data.messages.length && ticker && track) {
        const group = document.createElement('div');
        group.className = 'home-ticker-group';
        data.messages.forEach(msg => {
          const item = document.createElement('span');
          item.className = msg.url ? 'home-ticker-item home-ticker-item-with-link' : 'home-ticker-item';
          item.textContent = msg.text;
          if (msg.url) {
            const a = document.createElement('a');
            a.href = msg.url;
            a.className = 'home-ticker-link';
            a.target = '_blank';
            a.textContent = msg.url;
            item.appendChild(a);
          }
          group.appendChild(item);
          const sep = document.createElement('span');
          sep.className = 'home-ticker-separator';
          sep.textContent = '•';
          group.appendChild(sep);
        });
        track.appendChild(group.cloneNode(true));
        track.appendChild(group.cloneNode(true));
        let x = 0;
        const speed = 0.4;
        const halfWidth = track.scrollWidth / 2;
        let tickerPaused = false;
        function animateTicker() {
          if (!tickerPaused) {
            x -= speed;
            if (Math.abs(x) >= halfWidth) x = 0;
            track.style.transform = 'translateX(' + x + 'px)';
          }
          requestAnimationFrame(animateTicker);
        }
        requestAnimationFrame(animateTicker);
        const pauseBtn = document.getElementById('homeTickerPause');
        const pauseIcon = document.getElementById('homeTickerPauseIcon');
        const playIconSVG = '<polygon points="3,1 11,6 3,11" fill="white"/>';
        const pauseIconSVG = '<rect x="2" y="1" width="3" height="10" rx="1"/><rect x="7" y="1" width="3" height="10" rx="1"/>';
        if (pauseBtn) {
          pauseBtn.addEventListener('click', () => {
            tickerPaused = !tickerPaused;
            if (pauseIcon) pauseIcon.innerHTML = tickerPaused ? playIconSVG : pauseIconSVG;
            pauseBtn.setAttribute('aria-label', tickerPaused ? 'Play ticker' : 'Pause ticker');
          });
        }
        closeBtn && closeBtn.addEventListener('click', () => {
          ticker.classList.add('hidden');
          document.getElementById('homeTickerSpacer').style.display = 'none';
        });
      } else {
        ticker && ticker.classList.add('hidden');
      }
    } catch(e) {
      const ticker = document.getElementById('homeTicker');
      ticker && ticker.classList.add('hidden');
    }
  })();
</script>

</body>
</html>
