<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
</head>
<body class="homePage">
  <div class="homeHeaderRow">
    <h1 style="margin: 0 auto; text-align: center; width: 100%;">LW Schedule</h1>
  </div>
  <div id="digitalClock">
    <div id="clockLabel">TIME REMAINING</div>
    <div id="clockDisplay">
      <div class="time-block" id="clockDisplay-days-block">
        <span id="clockDisplay-days" class="time-value">00</span>
        <span class="time-label">DAYS</span>
      </div>
      <div class="time-block" id="clockDisplay-hours-block">
        <span id="clockDisplay-hours" class="time-value">00</span>
        <span class="time-label">HOURS</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-minutes" class="time-value">00</span>
        <span class="time-label">MINUTES</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-seconds" class="time-value">00</span>
        <span class="time-label">SECONDS</span>
      </div>
    </div>
  </div>
  <div id="timer"></div>
  <div id="homeTicker" class="home-ticker" role="region" aria-label="Site messages">
    <div class="home-ticker-inner">
      <div class="home-ticker-viewport">
        <div id="homeTickerTrack" class="home-ticker-track" aria-live="polite"></div>
      </div>
      <button type="button" id="homeTickerClose" class="home-ticker-close" aria-label="Dismiss ticker">&times;</button>
    </div>
  </div>
  <div id="homeTickerSpacer" aria-hidden="true"></div>

  <script src="/common-core.js"></script>
<script src="https://cdn.jsdelivr.net/npm/number-flow"></script>
<script>
    // Initialize clock with number-flow.js
    async function initClockMorphs() {
        if (!window.NumberFlow?.defineElement) {
            console.warn('Number Flow failed to load, using default clock updates.');
            return;
        }
        
        const clockDisplay = document.getElementById('clockDisplay');
        if (!clockDisplay) return;
        
        const daysEl = document.getElementById('clockDisplay-days');
        const hoursEl = document.getElementById('clockDisplay-hours');
        const minutesEl = document.getElementById('clockDisplay-minutes');
        const secondsEl = document.getElementById('clockDisplay-seconds');
        
        if (daysEl && !daysEl.querySelector('number-flow')) {
            daysEl.innerHTML = '<number-flow></number-flow>';
        }
        if (hoursEl && !hoursEl.querySelector('number-flow')) {
            hoursEl.innerHTML = '<number-flow></number-flow>';
        }
        if (minutesEl && !minutesEl.querySelector('number-flow')) {
            minutesEl.innerHTML = '<number-flow></number-flow>';
        }
        if (secondsEl && !secondsEl.querySelector('number-flow')) {
            secondsEl.innerHTML = '<number-flow></number-flow>';
        }
    }
    
    function updateClockMorphs(data) {
        const daysEl = document.getElementById('clockDisplay-days');
        const hoursEl = document.getElementById('clockDisplay-hours');
        const minutesEl = document.getElementById('clockDisplay-minutes');
        const secondsEl = document.getElementById('clockDisplay-seconds');
        
        if (daysEl) {
            const flowEl = daysEl.querySelector('number-flow');
            if (flowEl) flowEl.value = data.days;
            else daysEl.textContent = data.days;
        }
        if (hoursEl) {
            const flowEl = hoursEl.querySelector('number-flow');
            if (flowEl) flowEl.value = data.hours;
            else hoursEl.textContent = data.hours;
        }
        if (minutesEl) {
            const flowEl = minutesEl.querySelector('number-flow');
            if (flowEl) flowEl.value = data.minutes;
            else minutesEl.textContent = data.minutes;
        }
        if (secondsEl) {
            const flowEl = secondsEl.querySelector('number-flow');
            if (flowEl) flowEl.value = data.seconds;
            else secondsEl.textContent = data.seconds;
        }
    }
    
    initClockMorphs();
</script>
</body>
</html>
