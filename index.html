<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <script type="importmap">
{
  "imports": {
    "esm-env": "/vendor/esm-env.js"
  }
}
</script>
</head>
<body class="homePage">
  <div class="homeHeaderRow">
    <h1 style="margin: 0 auto; text-align: center; width: 100%;">LW Schedule</h1>
  </div>
  <div id="digitalClock">
    <div id="clockLabel">TIME REMAINING</div>
    <div id="clockDisplay">
      <div class="time-block" id="clockDisplay-days-block">
        <span id="clockDisplay-days" class="time-value">00</span>
        <span class="time-label">DAYS</span>
      </div>
      <div class="time-block" id="clockDisplay-hours-block">
        <span id="clockDisplay-hours" class="time-value">00</span>
        <span class="time-label">HOURS</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-minutes" class="time-value">00</span>
        <span class="time-label">MINUTES</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-seconds" class="time-value">00</span>
        <span class="time-label">SECONDS</span>
      </div>
    </div>
  </div>
  <div id="timer"></div>
  <div id="homeTicker" class="home-ticker" role="region" aria-label="Site messages">
    <div class="home-ticker-inner">
      <div class="home-ticker-viewport">
        <div id="homeTickerTrack" class="home-ticker-track" aria-live="polite"></div>
      </div>
      <button type="button" id="homeTickerClose" class="home-ticker-close" aria-label="Dismiss ticker">&times;</button>
    </div>
  </div>
  <div id="homeTickerSpacer" aria-hidden="true"></div>

  <script src="/common-core.js"></script>
<script>
  // Dynamically load number-flow.js as an ES Module
  async function loadNumberFlow() {
    try {
      await import('/vendor/number-flow.js');
      if (!customElements.get('number-flow')) {
        console.warn('Number Flow loaded but custom element not defined.');
        return false;
      }
      return true;
    } catch (error) {
      console.warn('Failed to load Number Flow:', error);
      return false;
    }
  }

  async function initClockMorphs() {
    const loaded = await loadNumberFlow();
    if (!loaded) return;

    const fields = ['days', 'hours', 'minutes', 'seconds'];
    const morphs = {};
    for (const field of fields) {
      const span = document.getElementById(`clockDisplay-${field}`);
      if (!span) continue;
      const nf = document.createElement('number-flow');
      nf.update(0);
      span.textContent = '';
      span.appendChild(nf);
      morphs[field] = nf;
    }

    window.updateClockMorphs = (data) => {
      if (data.days !== undefined) morphs.days?.update(data.days ?? 0);
      if (data.hours !== undefined) morphs.hours?.update(data.hours ?? 0);
      morphs.minutes?.update(data.minutes ?? 0);
      morphs.seconds?.update(data.seconds ?? 0);
    };

    const timerEl = document.getElementById('timer');
    window.updateNextPeriodBlock = (text) => {
      if (timerEl) timerEl.textContent = text;
    };
  }
</script>
<script>
  (async () => {
    if (typeof window.loadCommon === 'function') {
      try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
    }
    await initClockMorphs();
    await initApp();
    updateClock();
    setInterval(updateClock, 1000);

    // Ticker
    try {
      const res = await fetch('/data/ticker-messages.json');
      const data = await res.json();
      const ticker = document.getElementById('homeTicker');
      const track = document.getElementById('homeTickerTrack');
      const closeBtn = document.getElementById('homeTickerClose');
      if (data.messages && data.messages.length && ticker && track) {
        const group = document.createElement('div');
        group.className = 'home-ticker-group';
        data.messages.forEach(msg => {
          const item = document.createElement('span');
          item.className = msg.url ? 'home-ticker-item home-ticker-item-with-link' : 'home-ticker-item';
          item.textContent = msg.text;
          if (msg.url) {
            const a = document.createElement('a');
            a.href = msg.url;
            a.className = 'home-ticker-link';
            a.target = '_blank';
            a.textContent = msg.url;
            item.appendChild(a);
          }
          group.appendChild(item);
          const sep = document.createElement('span');
          sep.className = 'home-ticker-separator';
          sep.textContent = '•';
          group.appendChild(sep);
        });
        track.appendChild(group.cloneNode(true));
        track.appendChild(group.cloneNode(true));
        let x = 0;
        const speed = 0.4;
        const halfWidth = track.scrollWidth / 2;
        function animateTicker() {
          x -= speed;
          if (Math.abs(x) >= halfWidth) x = 0;
          track.style.transform = `translateX(${x}px)`;
          requestAnimationFrame(animateTicker);
        }
        requestAnimationFrame(animateTicker);
        closeBtn && closeBtn.addEventListener('click', () => {
          ticker.classList.add('hidden');
          document.getElementById('homeTickerSpacer').style.display = 'none';
        });
      } else {
        ticker && ticker.classList.add('hidden');
      }
    } catch(e) {
      const ticker = document.getElementById('homeTicker');
      ticker && ticker.classList.add('hidden');
    }
  })();
</script>

</body>
</html>
