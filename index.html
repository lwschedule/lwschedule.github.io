<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LW Schedule (Beta)</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <style>@font-face {
  font-family: 'SF Pro Display';
  src: url('/SF-Pro-Display-Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

:root {
  --primary: #000000;
  --primary-light: #111111;
  --text-light: #e8e8e8;
  --bg-dark: #000000;
  --card-dark: #080808;
  --glow: 0 0 0 1px #333, 0 0 15px rgba(255,255,255,0.05);
  --error: #ff4757;
  --page-transition-distance: 28px;
  --page-transition-duration: 280ms;
  --page-transition-ease: cubic-bezier(0.22, 1, 0.36, 1);
}

* {
  font-family: 'SF Pro Display', sans-serif;
  box-sizing: border-box;
}

body {
  background: var(--bg-dark);
  color: var(--text-light);
  margin: 0;
  padding: 20px;
  scrollbar-width: none;
  -ms-overflow-style: none;
  transition: all 0.3s ease;
  padding-bottom: 100px;
}

body > *:not(script):not(style):not(link):not(meta):not(title):not(#globalSidebar):not(#sidebarMobileToggle) {
  opacity: 0;
  transform: translateX(calc(var(--page-transition-distance) * -1));
  transition:
    transform var(--page-transition-duration) var(--page-transition-ease),
    opacity var(--page-transition-duration) ease;
  will-change: transform, opacity;
}

body.page-transition-ready > *:not(script):not(style):not(link):not(meta):not(title):not(#globalSidebar):not(#sidebarMobileToggle) {
  opacity: 1;
  transform: translateX(0);
}

body.page-transition-exit-forward > *:not(script):not(style):not(link):not(meta):not(title):not(#globalSidebar):not(#sidebarMobileToggle),
body.page-transition-exit-back > *:not(script):not(style):not(link):not(meta):not(title):not(#globalSidebar):not(#sidebarMobileToggle) {
  opacity: 0;
  transform: translateX(var(--page-transition-distance));
  pointer-events: none;
}

@media (prefers-reduced-motion: reduce) {
  body > *:not(script):not(style):not(link):not(meta):not(title):not(#globalSidebar):not(#sidebarMobileToggle) {
    transition: none;
    transform: none;
    opacity: 1;
  }

  body.page-transition-exit-forward > *:not(script):not(style):not(link):not(meta):not(title):not(#globalSidebar):not(#sidebarMobileToggle),
  body.page-transition-exit-back > *:not(script):not(style):not(link):not(meta):not(title):not(#globalSidebar):not(#sidebarMobileToggle) {
    transform: none;
    opacity: 1;
  }
}

body::-webkit-scrollbar {
  display: none;
}

h1, h2, h3 {
  text-align: center;
  color: white;
}

.pageContainer {
  max-width: 650px;
  margin: 0 auto;
  padding: 20px 0 10px 0;
  display: flex;
  flex-direction: column;
}

#digitalClock {
  font-weight: 700;
  text-align: center;
  color: white;
  background: var(--primary);
  padding: 20px;
  border-radius: 16px;
  box-shadow: var(--glow);
  max-width: 650px;
  margin: 20px auto;
}

#clockLabel {
  font-size: 0.8em;
  margin-bottom: 10px;
  color: white;
  opacity: 0.9;
  font-weight: 700;
}

#clockDisplay {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  gap: 15px;
  margin-top: 15px;
}

.time-block {
  background: rgba(0, 0, 0, 0.2);
  border-radius: 12px;
  padding: 15px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.time-value {
  font-size: clamp(1.8em, 6vw, 2.8em);
  font-weight: 700;
  color: white;
  line-height: 1;
  text-align: center;
  position: relative;
  overflow: hidden;
  width: 100%;
  display: block;
}

.time-value number-flow {
  display: inline-block;
  min-width: 2ch;
  text-align: center;
}

.time-label {
  font-size: 0.7em;
  font-weight: 400;
  color: white;
  opacity: 0.8;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 5px;
}

.time-block.hidden {
  display: none;
}

#timer {
  font-size: clamp(0.9em, 4vw, 1.1em);
  margin-top: 20px;
  text-align: center;
  background: var(--primary);
  padding: 15px;
  border-radius: 16px;
  box-shadow: var(--glow);
  color: var(--text-light);
  max-width: 650px;
  margin: 20px auto;
}

.mainBtn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 1.1em;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: var(--glow);
  transition: all 0.3s;
  font-weight: 700;
  text-decoration: none;
  text-align: center;
  display: block;
}

.mainBtn:hover {
  transform: scale(1.05);
}

.scheduleTable {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: var(--card-dark);
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #303030;
}

.scheduleTable th {
  background: var(--primary);
  color: white;
  padding: 12px;
  text-align: left;
  font-weight: 700;
}

.scheduleTable td {
  padding: 12px;
  border-bottom: 1px solid #303030;
}

.scheduleTable tr:last-child td {
  border-bottom: none;
}

.scheduleTable tr.highlight {
  background: transparent;
  color: white;
  font-weight: 700;
  outline: 2px solid white;
  outline-offset: -2px;
  box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.35);
}

.scheduleTable tr:not(.highlight):hover {
  background: var(--primary-light);
}

.noSchoolMessage {
  text-align: center;
  padding: 40px 20px;
  font-size: 1.3em;
}

.noSchoolMessage h3 {
  font-size: 2em;
  margin-bottom: 20px;
  color: white;
  margin-top: 0;
}

.noSchoolMessage p {
  font-size: 1.2em;
  color: var(--text-light);
  opacity: 0.8;
  margin: 0;
}

/* Global Sidebar Styles */
body.has-sidebar {
  padding-left: 270px;
}

@media (max-width: 768px) {
  body.has-sidebar {
    padding-left: 20px;
  }
}

#globalSidebar {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: 250px;
  background: var(--card-dark);
  box-shadow: 2px 0 10px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  z-index: 1000;
  transform: translateX(0);
  transition: transform 0.3s ease;
  overflow-y: auto;
  border-right: 1px solid var(--primary);
}

.sidebar-header {
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-bottom: 1px solid var(--primary);
  min-height: 80px;
}

.sidebar-logo {
  width: 40px;
  height: 40px;
  border-radius: 10px;
}

.sidebar-title {
  margin: 0;
  font-size: 1.2em;
  font-weight: 700;
  color: var(--text-light);
}

.sidebar-links-container {
  padding: 15px 10px;
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.sidebar-link {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 12px 15px;
  text-decoration: none;
  color: var(--text-light);
  font-size: 1.05em;
  font-weight: 600;
  border-radius: 12px;
  transition: color 0.3s ease;
  position: relative;
  z-index: 2;
  opacity: 0.8;
}

.sidebar-link:hover, .sidebar-link.active {
  opacity: 1;
}

/* Fluid Bubble */
.sidebar-bubble {
  position: absolute;
  left: 10px;
  right: 10px;
  height: 46px;
  background: var(--primary-light);
  border-radius: 12px;
  z-index: 1;
  opacity: 0;
  transition: top 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), height 0.3s ease;
  pointer-events: none;
  box-shadow: var(--glow);
}

#sidebarMobileToggle {
  display: none;
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1001;
  background: var(--card-dark);
  border: 1px solid var(--primary-light);
  color: var(--text-light);
  font-size: 1.5em;
  border-radius: 8px;
  width: 45px;
  height: 45px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.sidebar-mask {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(3px);
  z-index: 999;
}

@media (max-width: 768px) {
  #globalSidebar {
    transform: translateX(-100%);
  }

  #globalSidebar.open {
    transform: translateX(0);
  }

  #sidebarMobileToggle {
    display: flex;
  }

  .sidebar-mask.show {
    display: block;
  }

  .homeHeaderRow h1 {
    margin-left: 50px;
  }
}

/* Explicit large-screen visibility rule */
@media (min-width: 769px) {
  #globalSidebar {
    display: flex;
    transform: translateX(0);
  }

  body.has-sidebar {
    padding-left: 270px;
  }
}</style>

  <noscript><link rel="stylesheet" href="/common.css"></noscript>
</head>
<body class="homePage">
  <div class="homeHeaderRow">
    <h1 style="margin: 0 auto; text-align: center; width: 100%;">LW Schedule <i>Beta</i></h1>
  </div>
  <div id="digitalClock">
    <div id="clockLabel">TIME REMAINING</div>
    <div id="clockDisplay">
      <div class="time-block" id="clockDisplay-days-block">
        <span id="clockDisplay-days" class="time-value"><number-flow id="clock-days" format='{"minimumIntegerDigits":2}'></number-flow></span>
        <span class="time-label">DAYS</span>
      </div>
      <div class="time-block" id="clockDisplay-hours-block">
        <span id="clockDisplay-hours" class="time-value"><number-flow id="clock-hours" format='{"minimumIntegerDigits":2}'></number-flow></span>
        <span class="time-label">HOURS</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-minutes" class="time-value"><number-flow id="clock-minutes" format='{"minimumIntegerDigits":2}'></number-flow></span>
        <span class="time-label">MINUTES</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-seconds" class="time-value"><number-flow id="clock-seconds" format='{"minimumIntegerDigits":2}'></number-flow></span>
        <span class="time-label">SECONDS</span>
      </div>
    </div>
  </div>
  <div id="timer"></div>
  <div id="homeTicker" class="home-ticker" role="region" aria-label="Site messages">
    <div class="home-ticker-inner">
      <div class="home-ticker-viewport">
        <div id="homeTickerTrack" class="home-ticker-track" aria-live="polite"></div>
      </div>
      <button type="button" id="homeTickerClose" class="home-ticker-close" aria-label="Dismiss ticker">&times;</button>
    </div>
  </div>
  <div id="homeTickerSpacer" aria-hidden="true"></div>

  <script src="/common-core.js"></script>
  <script>
    let tickerRafId = null;
    let clockIntervalId = null;
    let tickerLastFrameTs = 0;
    let tickerOffsetPx = 0;
    let tickerLoopWidthPx = 0;
    const TICKER_SPEED_PX_PER_SEC = 42;

    async function initNumberFlows() {
      try {
        await import('https://esm.sh/number-flow');
      } catch (error) {
        console.warn('NumberFlow failed to load for clock, using default updates.', error);
      }
    }

    function stopTickerLoop() {
      if (tickerRafId) {
        cancelAnimationFrame(tickerRafId);
        tickerRafId = null;
      }
      tickerLastFrameTs = 0;
    }

    function startTickerLoop() {
      const track = document.getElementById('homeTickerTrack');
      const groups = track ? track.querySelectorAll('.home-ticker-group') : [];
      const firstGroup = groups[0];
      const secondGroup = groups[1];
      if (!track || !firstGroup || !secondGroup) return;

      stopTickerLoop();
      tickerOffsetPx = 0;
      track.style.transform = 'translateX(0px)';

      const computeLoopWidth = () => {
        const firstLeft = firstGroup.offsetLeft;
        const secondLeft = secondGroup.offsetLeft;
        const offsetDistance = secondLeft - firstLeft;
        if (offsetDistance > 0) {
          return offsetDistance;
        }

        const computed = getComputedStyle(track);
        const gap = parseFloat(computed.gap || computed.columnGap || '0') || 0;
        return firstGroup.getBoundingClientRect().width + gap;
      };

      tickerLoopWidthPx = computeLoopWidth();

      const step = (ts) => {
        if (!tickerLastFrameTs) tickerLastFrameTs = ts;
        const deltaSec = (ts - tickerLastFrameTs) / 1000;
        tickerLastFrameTs = ts;

        if (!tickerLoopWidthPx || tickerLoopWidthPx <= 0) {
          tickerLoopWidthPx = computeLoopWidth();
        }

        if (tickerLoopWidthPx > 0) {
          tickerOffsetPx += TICKER_SPEED_PX_PER_SEC * deltaSec;
          if (tickerOffsetPx >= tickerLoopWidthPx) {
            tickerOffsetPx -= tickerLoopWidthPx;
          }
          track.style.transform = `translateX(${-tickerOffsetPx}px)`;
        }

        tickerRafId = requestAnimationFrame(step);
      };

      tickerRafId = requestAnimationFrame(step);
    }

    function buildTickerGroup(messages) {
      const group = document.createElement('div');
      group.className = 'home-ticker-group';

      messages.forEach((message) => {
        const item = document.createElement('span');
        item.className = 'home-ticker-item';

        if (message.url) {
          item.classList.add('home-ticker-item-with-link');
          const messageText = document.createElement('span');
          messageText.textContent = message.text;

          const link = document.createElement('a');
          link.className = 'home-ticker-link';
          link.href = message.url;
          link.textContent = message.url;

          if (/^https?:\/\//i.test(message.url)) {
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
          }

          item.appendChild(messageText);
          item.appendChild(link);
        } else {
          item.textContent = message.text;
        }

        group.appendChild(item);

        const separator = document.createElement('span');
        separator.className = 'home-ticker-separator';
        separator.textContent = '•';
        group.appendChild(separator);
      });

      return group;
    }

    function renderTicker(messages) {
      const track = document.getElementById('homeTickerTrack');
      if (!track) return;

      track.innerHTML = '';
      const groupA = buildTickerGroup(messages);
      const groupB = buildTickerGroup(messages);
      groupB.setAttribute('aria-hidden', 'true');

      track.appendChild(groupA);
      track.appendChild(groupB);

      startTickerLoop();
    }

    async function initHomeTicker() {
      const ticker = document.getElementById('homeTicker');
      const spacer = document.getElementById('homeTickerSpacer');
      const closeButton = document.getElementById('homeTickerClose');

      if (!ticker || !spacer || !closeButton) return;
      let lastViewportWidth = window.innerWidth;
      let resizeRestartTimeoutId = null;

      closeButton.addEventListener('click', () => {
        if (resizeRestartTimeoutId) {
          clearTimeout(resizeRestartTimeoutId);
          resizeRestartTimeoutId = null;
        }
        stopTickerLoop();
        ticker.classList.add('hidden');
        spacer.style.height = '0px';
      });

      window.addEventListener('resize', () => {
        if (ticker.classList.contains('hidden')) return;

        const nextViewportWidth = window.innerWidth;
        if (nextViewportWidth === lastViewportWidth) return;
        lastViewportWidth = nextViewportWidth;

        if (resizeRestartTimeoutId) {
          clearTimeout(resizeRestartTimeoutId);
        }

        resizeRestartTimeoutId = setTimeout(() => {
          resizeRestartTimeoutId = null;
          if (!ticker.classList.contains('hidden')) {
            startTickerLoop();
          }
        }, 120);
      });

      try {
        const response = await fetch('/data/ticker-messages.json');
        if (!response.ok) throw new Error('Failed to load ticker messages');

        const data = await response.json();
        const messages = Array.isArray(data.messages)
          ? data.messages
              .map(msg => ({
                text: typeof msg.text === 'string' ? msg.text.trim() : '',
                url: typeof msg.url === 'string' ? msg.url.trim() : ''
              }))
              .filter(msg => msg.text.length > 0)
          : [];

        if (!messages.length) {
          stopTickerLoop();
          ticker.classList.add('hidden');
          spacer.style.height = '0px';
          return;
        }

        renderTicker(messages);
      } catch (error) {
        console.error('Ticker load error:', error);
        stopTickerLoop();
        ticker.classList.add('hidden');
        spacer.style.height = '0px';
      }
    }

    (async () => {
      if (typeof window.loadModules === 'function') {
        try {
          await window.loadModules(['navigation', 'data', 'schedule', 'clubs', 'clock', 'calendar']);
        } catch (err) {
          console.error('Failed to load modules:', err);
        }
      }
      if (typeof initApp === 'function') await initApp();
      if (typeof initTimerMorph === 'function') await initTimerMorph();
      await initNumberFlows();
      if (typeof updateClock === 'function') {
        updateClock();
        clockIntervalId = setInterval(updateClock, 1000);
      }
      await initHomeTicker();

      // Throttle background work: pause clock and ticker when tab hidden
      if (window.appVisibility && typeof window.appVisibility.onHidden === 'function') {
        window.appVisibility.onHidden(() => {
          if (clockIntervalId) {
            clearInterval(clockIntervalId);
            clockIntervalId = null;
          }
          try { stopTickerLoop(); } catch (e) { /* ignore */ }
        });
        window.appVisibility.onVisible(() => {
          if (!clockIntervalId && typeof updateClock === 'function') {
            updateClock();
            clockIntervalId = setInterval(updateClock, 1000);
          }
          try { startTickerLoop(); } catch (e) { /* ignore */ }
        });
      } else {
        document.addEventListener('visibilitychange', () => {
          if (document.hidden) {
            if (clockIntervalId) { clearInterval(clockIntervalId); clockIntervalId = null; }
            try { stopTickerLoop(); } catch (e) { }
          } else {
            if (!clockIntervalId && typeof updateClock === 'function') { updateClock(); clockIntervalId = setInterval(updateClock, 1000); }
            try { startTickerLoop(); } catch (e) { }
          }
        });
      }
      
      
      const banner = document.getElementById('clubsBanner');
      if (banner && localStorage.getItem('clubsBannerDismissed') !== 'true') {
        banner.style.display = 'flex';
      }
      const closeBtn = document.getElementById('closeBanner');
      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          banner.style.display = 'none';
          localStorage.setItem('clubsBannerDismissed', 'true');
        });
      }
    })();
  </script>
</body>
