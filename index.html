<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
  <style>
    .homeHeaderNew {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      gap: 20px;
    }
    .homeGreetingSection {
      flex: 1;
    }
    .homeGreeting {
      font-size: 1.8em;
      font-weight: 700;
      color: white;
      margin: 0 0 6px 0;
    }
    .homeGreetingName {
      color: #a855f7;
    }
    .homeGreetingSubtext {
      font-size: 0.95em;
      color: #999;
      margin: 0;
    }
    .homeDateDisplay {
      background: var(--card-dark);
      border: 1px solid var(--primary-light);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95em;
      font-weight: 600;
      color: var(--text-light);
      white-space: nowrap;
    }
    .homeDateDisplay svg {
      width: 18px;
      height: 18px;
      filter: brightness(0) saturate(100%) invert(80%) sepia(10%) saturate(200%) hue-rotate(200deg);
    }
    .upcomingSection {
      margin-top: 32px;
    }
    .upcomingTitle {
      font-size: 1.3em;
      font-weight: 700;
      color: white;
      margin: 0 0 16px 0;
    }
    .upcomingGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .upcomingTile {
      background: var(--card-dark);
      border: 1px solid var(--primary-light);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.3s ease;
      cursor: default;
    }
    .upcomingTile:hover {
      border-color: #6b2cf5;
      box-shadow: 0 0 20px rgba(107, 44, 245, 0.3);
      transform: translateY(-2px);
    }
    .upcomingTileIcon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
    }
    .upcomingTileIcon.next-period {
      background: rgba(168, 85, 247, 0.2);
      color: #a855f7;
    }
    .upcomingTileIcon.upcoming-event {
      background: rgba(6, 182, 212, 0.2);
      color: #06b6d4;
    }
    .upcomingTileIcon.quarter-countdown {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }
    .upcomingTileTitle {
      font-size: 0.85em;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0;
    }
    .upcomingTileContent {
      font-size: 1.1em;
      font-weight: 600;
      color: white;
      margin: 0;
      line-height: 1.4;
    }
    .upcomingTileTimeLeft {
      font-size: 0.9em;
      color: #a855f7;
      font-weight: 600;
      margin: 0;
    }
    .upcomingTileTimeLeft.event {
      color: #06b6d4;
    }
    .upcomingTileTimeLeft.quarter {
      color: #fbbf24;
    }
    .upcomingTileEmpty {
      font-size: 0.9em;
      color: #666;
      font-weight: 400;
      line-height: 1.5;
    }

    .home-ticker {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-dark);
      border: 1px solid var(--primary-light);
      border-radius: 50px;
      padding: 12px 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      z-index: 1000;
      max-width: 90vw;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .home-ticker.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(20px);
    }
    .home-ticker-inner {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .home-ticker-viewport {
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }
    .home-ticker-track {
      display: flex;
      gap: 32px;
      animation: ticker-scroll 30s linear infinite;
      white-space: nowrap;
    }
    .home-ticker-track.paused {
      animation-play-state: paused;
    }
    @keyframes ticker-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .home-ticker-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .home-ticker-item {
      color: var(--text-light);
      font-size: 0.92em;
      font-weight: 500;
    }
    .home-ticker-item-with-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .home-ticker-link {
      color: #a855f7;
      text-decoration: none;
      border-bottom: 1px dotted #a855f7;
    }
    .home-ticker-link:hover {
      border-bottom-style: solid;
    }
    .home-ticker-separator {
      color: #444;
      font-size: 0.8em;
    }
    .home-ticker-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .home-ticker-pause-btn {
      background: transparent;
      border: none;
      color: #999;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }
    .home-ticker-pause-btn:hover {
      background: var(--primary-light);
      color: white;
    }
    .home-ticker-pause-btn svg {
      width: 18px;
      height: 18px;
    }
    .home-ticker-close {
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      font-size: 1.4em;
      line-height: 1;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }
    .home-ticker-close:hover {
      background: var(--primary-light);
      color: white;
    }
    #homeTickerSpacer {
      height: 60px;
    }

    @media (max-width: 900px) {
      .upcomingGrid {
        grid-template-columns: 1fr;
      }
      .homeHeaderNew {
        flex-direction: column;
      }
      .homeDateDisplay {
        width: fit-content;
      }
    }
  </style>
</head>
<body class="homePage">
  <div class="homeHeaderNew">
    <div class="homeGreetingSection">
      <h1 class="homeGreeting" id="homeGreeting">Good morning, <span class="homeGreetingName" id="homeGreetingName">there</span>!</h1>
      <p class="homeGreetingSubtext">Here's what's coming up.</p>
    </div>
    <div class="homeDateDisplay" id="homeDateDisplay">
      <svg src="/icons/src/calendar.svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      <span id="homeDateText">Loading...</span>
    </div>
  </div>

  <div id="digitalClock">
    <div id="clockLabel">TIME REMAINING</div>
    <div id="clockDisplay">
      <div class="time-block" id="clockDisplay-days-block">
        <span id="clockDisplay-days" class="time-value">00</span>
        <span class="time-label">DAYS</span>
      </div>
      <div class="time-block" id="clockDisplay-hours-block">
        <span id="clockDisplay-hours" class="time-value">00</span>
        <span class="time-label">HOURS</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-minutes" class="time-value">00</span>
        <span class="time-label">MINUTES</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-seconds" class="time-value">00</span>
        <span class="time-label">SECONDS</span>
      </div>
    </div>
  </div>

  <div class="upcomingSection">
    <h2 class="upcomingTitle">Upcoming</h2>
    <div class="upcomingGrid">
      <div class="upcomingTile" id="upcomingNextPeriod">
        <div class="upcomingTileIcon next-period">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </div>
        <p class="upcomingTileTitle">Next Period</p>
        <p class="upcomingTileContent" id="upcomingNextPeriodContent">Loading...</p>
        <p class="upcomingTileTimeLeft" id="upcomingNextPeriodTimeLeft"></p>
      </div>
      <div class="upcomingTile" id="upcomingEvent">
        <div class="upcomingTileIcon upcoming-event">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
          </svg>
        </div>
        <p class="upcomingTileTitle">Next Event</p>
        <p class="upcomingTileContent" id="upcomingEventContent">Loading...</p>
        <p class="upcomingTileTimeLeft event" id="upcomingEventTimeLeft"></p>
      </div>
      <div class="upcomingTile" id="upcomingQuarter">
        <div class="upcomingTileIcon quarter-countdown">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
          </svg>
        </div>
        <p class="upcomingTileTitle">Quarter Ends</p>
        <p class="upcomingTileContent" id="upcomingQuarterContent">Loading...</p>
        <p class="upcomingTileTimeLeft quarter" id="upcomingQuarterTimeLeft"></p>
      </div>
    </div>
  </div>

  <div id="homeTicker" class="home-ticker" role="region" aria-label="Site messages">
    <div class="home-ticker-inner">
      <div class="home-ticker-viewport">
        <div id="homeTickerTrack" class="home-ticker-track" aria-live="polite"></div>
      </div>
      <div class="home-ticker-controls">
        <button type="button" id="homeTickerPause" class="home-ticker-pause-btn" aria-label="Pause messages">
          <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </button>
        <button type="button" id="homeTickerClose" class="home-ticker-close" aria-label="Dismiss ticker">&times;</button>
      </div>
    </div>
  </div>
  <div id="homeTickerSpacer" aria-hidden="true"></div>

  <script src="/common-core.js"></script>
<script>
  async function loadNumberFlow() {
    try {
      await import('/vendor/number-flow.js');
      if (!customElements.get('number-flow')) {
        console.warn('Number Flow loaded but custom element not defined.');
        return false;
      }
      return true;
    } catch (error) {
      console.warn('Failed to load number-flow:', error);
      return false;
    }
  }

  async function initClockMorphs() {
    const loaded = await loadNumberFlow();
    if (!loaded) return;

    const fields = ['days', 'hours', 'minutes', 'seconds'];
    const morphs = {};
    for (const field of fields) {
      const span = document.getElementById(`clockDisplay-${field}`);
      if (!span) continue;
      const nf = document.createElement('number-flow');
      nf.update(0);
      span.textContent = '';
      span.appendChild(nf);
      morphs[field] = nf;
    }

    window.updateClockMorphs = (data) => {
      if (data.days !== undefined) morphs.days?.update(data.days ?? 0);
      if (data.hours !== undefined) morphs.hours?.update(data.hours ?? 0);
      morphs.minutes?.update(data.minutes ?? 0);
      morphs.seconds?.update(data.seconds ?? 0);
    };
  }

  function updateGreeting() {
    const hour = new Date().getHours();
    let greeting = 'Good morning';
    if (hour >= 12 && hour < 17) greeting = 'Good afternoon';
    else if (hour >= 17 && hour < 22) greeting = 'Good evening';
    else if (hour >= 22 || hour < 6) greeting = 'Good night';
    
    const profile = getProfile();
    const name = profile && profile.name ? profile.name : 'there';
    document.getElementById('homeGreeting').innerHTML = `${greeting}, <span class="homeGreetingName">${name}</span>!`;
  }

  function updateDateDisplay() {
    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const dateString = now.toLocaleDateString('en-US', options);
    document.getElementById('homeDateText').textContent = dateString;
  }

  async function loadUpcomingData() {
    updateGreeting();
    updateDateDisplay();
    
    const profile = getProfile();
    const followedEvents = profile ? profile.followedEvents || [] : [];
    
    try {
      const [eventsRes, clubsRes, termsRes] = await Promise.all([
        fetch('/data/events.json'),
        fetch('/data/clubs.json'),
        fetch('/data/terms.json')
      ]);
      const eventsData = await eventsRes.json();
      const clubsData = await clubsRes.json();
      const termsData = await termsRes.json();
      
      const allEvents = [];
      if (eventsData.standardizedTests) {
        allEvents.push(...eventsData.standardizedTests);
      }
      if (eventsData.apTests) {
        allEvents.push(...eventsData.apTests);
      }
      if (eventsData.schoolEvents) {
        allEvents.push(...eventsData.schoolEvents);
      }
      if (clubsData.clubs) {
        allEvents.push(...clubsData.clubs.map(c => ({ ...c, title: c.name })));
      }
      
      const upcomingEventEl = document.getElementById('upcomingEventContent');
      const upcomingEventTimeLeftEl = document.getElementById('upcomingEventTimeLeft');
      
      const followedEventsList = allEvents.filter(e => followedEvents.includes(e.id));
      const sortedEvents = followedEventsList
        .filter(e => e.date)
        .sort((a, b) => new Date(a.date) - new Date(b.date));
      
      if (sortedEvents.length > 0) {
        const nextEvent = sortedEvents[0];
        upcomingEventEl.textContent = nextEvent.title || nextEvent.name;
        const daysUntil = Math.ceil((new Date(nextEvent.date) - new Date()) / (1000 * 60 * 60 * 24));
        upcomingEventTimeLeftEl.textContent = daysUntil === 1 ? 'Tomorrow' : `${daysUntil} days away`;
      } else {
        upcomingEventEl.textContent = "Nothing coming soon!";
        upcomingEventTimeLeftEl.textContent = "Choose more events in settings to see them here.";
      }
      
      const now = new Date();
      const currentQuarter = termsData.quarters.find(q => {
        const start = new Date(q.start);
        const end = new Date(q.end);
        return now >= start && now <= end;
      });
      
      const quarterEndEl = document.getElementById('upcomingQuarterContent');
      const quarterTimeLeftEl = document.getElementById('upcomingQuarterTimeLeft');
      
      if (currentQuarter) {
        const endDate = new Date(currentQuarter.end);
        const daysUntil = Math.ceil((endDate - now) / (1000 * 60 * 60 * 24));
        quarterEndEl.textContent = currentQuarter.name;
        if (daysUntil > 0) {
          quarterTimeLeftEl.textContent = `${daysUntil} days remaining`;
        } else {
          quarterTimeLeftEl.textContent = 'Ends today!';
        }
      } else {
        quarterEndEl.textContent = 'No active quarter';
        quarterTimeLeftEl.textContent = '';
      }
    } catch (error) {
      console.error('Error loading upcoming data:', error);
      document.getElementById('upcomingEventContent').textContent = 'Error loading events';
      document.getElementById('upcomingQuarterContent').textContent = 'Error loading quarter info';
    }
  }

  let tickerPaused = false;
  function initTicker() {
    const pauseBtn = document.getElementById('homeTickerPause');
    const pauseIcon = document.getElementById('pauseIcon');
    const playIcon = document.getElementById('playIcon');
    
    pauseBtn.addEventListener('click', () => {
      tickerPaused = !tickerPaused;
      const track = document.getElementById('homeTickerTrack');
      if (tickerPaused) {
        track.classList.add('paused');
        pauseIcon.style.display = 'block';
        playIcon.style.display = 'none';
      } else {
        track.classList.remove('paused');
        pauseIcon.style.display = 'none';
        playIcon.style.display = 'block';
      }
    });
    
    const closeBtn = document.getElementById('homeTickerClose');
    closeBtn.addEventListener('click', () => {
      document.getElementById('homeTicker').classList.add('hidden');
      document.getElementById('homeTickerSpacer').style.display = 'none';
    });
  }
</script>
<script>
  (async () => {
    if (typeof window.loadCommon === 'function') {
      try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
    }
    await initClockMorphs();
    await initApp();
    checkSetupComplete();
    updateClock();
    setInterval(updateClock, 1000);
    
    updateGreeting();
    updateDateDisplay();
    loadUpcomingData();
    setInterval(() => {
      updateGreeting();
      updateDateDisplay();
      loadUpcomingData();
    }, 60000);
    
    initTicker();
    
    try {
      const res = await fetch('/data/ticker-messages.json');
      const data = await res.json();
      const ticker = document.getElementById('homeTicker');
      const track = document.getElementById('homeTickerTrack');
      if (data.messages && data.messages.length && ticker && track) {
        const group = document.createElement('div');
        group.className = 'home-ticker-group';
        data.messages.forEach(msg => {
          const item = document.createElement('span');
          item.className = msg.url ? 'home-ticker-item home-ticker-item-with-link' : 'home-ticker-item';
          item.textContent = msg.text;
          if (msg.url) {
            const a = document.createElement('a');
            a.href = msg.url;
            a.className = 'home-ticker-link';
            a.target = '_blank';
            a.textContent = msg.url;
            item.appendChild(a);
          }
          group.appendChild(item);
          const sep = document.createElement('span');
          sep.className = 'home-ticker-separator';
          sep.textContent = '•';
          group.appendChild(sep);
        });
        track.appendChild(group.cloneNode(true));
        track.appendChild(group.cloneNode(true));
      } else {
        ticker && ticker.classList.add('hidden');
      }
    } catch(e) {
      const ticker = document.getElementById('homeTicker');
      ticker && ticker.classList.add('hidden');
    }
  })();
</script>

</body>
</html>
