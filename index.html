<body class="homePage">
  <div class="home-header-new">
    <div class="home-greeting-col">

      <div>

        <div class="home-date-full" id="homeDateFull"></div>
      </div>
    </div>
  </div>
  <div id="digitalClock">

        <span class="time-label">DAYS</span>
      </div>
      <div class="time-block" id="clockDisplay-hours-block">
        <span id="clockDisplay-hours" class="time-value">00</span>
        <span class="time-label">HOURS</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-minutes" class="time-value">00</span>
        <span class="time-label">MINUTES</span>
      </div>
      <div class="time-block">
        <span id="clockDisplay-seconds" class="time-value">00</span>
        <span class="time-label">SECONDS</span>
      </div>
    </div>
  </div>

  <div id="homeTicker" class="home-ticker" role="region" aria-label="Site messages">
    <div class="home-ticker-inner">
      <div class="home-ticker-viewport">
        <div id="homeTickerTrack" class="home-ticker-track" aria-live="polite"></div>
      </div>
      <button type="button" id="homeTickerPause" class="home-ticker-pause" aria-label="Pause ticker">
        <svg id="homeTickerPauseIcon" width="12" height="12" viewBox="0 0 12 12" fill="white">
          <rect x="2" y="1" width="3" height="10" rx="1"/>
          <rect x="7" y="1" width="3" height="10" rx="1"/>
        </svg>
      </button>
      <button type="button" id="homeTickerClose" class="home-ticker-close" aria-label="Dismiss ticker">&times;</button>
    </div>
  </div>
  <div id="homeTickerSpacer" aria-hidden="true"></div>

  <script src="/common-core.js"></script>
<script>
  // Dynamically load number-flow.js as an ES Module
  async function loadNumberFlow() {
    try {
      await import('/vendor/number-flow.js');
      if (!customElements.get('number-flow')) {
        console.warn('Number Flow loaded but custom element not defined.');
        return false;
      }
      return true;
    } catch (error) {
      console.warn('Failed to load Number Flow:', error);
      return false;
    }
  }

  async function initClockMorphs() {
    const loaded = await loadNumberFlow();
    if (!loaded) return;

    const fields = ['days', 'hours', 'minutes', 'seconds'];
    const morphs = {};
    for (const field of fields) {
      const span = document.getElementById(`clockDisplay-${field}`);
      if (!span) continue;
      const nf = document.createElement('number-flow');
      nf.update(0);
      span.textContent = '';
      span.appendChild(nf);
      morphs[field] = nf;
    }

    window.updateClockMorphs = (data) => {
      if (data.days !== undefined) morphs.days?.update(data.days ?? 0);
      if (data.hours !== undefined) morphs.hours?.update(data.hours ?? 0);
      morphs.minutes?.update(data.minutes ?? 0);
      morphs.seconds?.update(data.seconds ?? 0);
    };

    const timerEl = document.getElementById('timer');
    window.updateNextPeriodBlock = (text) => {
      if (timerEl) timerEl.textContent = text;
    };
  }
</script>
<script>
  (async () => {
    if (typeof window.loadCommon === 'function') {
      try { await window.loadCommon(); } catch (err) { console.error('Failed to load common runtime:', err); }
    }
    await initClockMorphs();
    await initApp();
    checkSetupComplete();

    // Hide upcoming tiles when there is no data to display
    (function hideUnusedUpcomingTiles() {
      // Tile 2 (followed events) is always visible — shows "no events" message when empty

      // If all tiles removed, remove the entire upcoming section
      try {
        const section = document.querySelector('.upcoming-section');
        if (section && !section.querySelector('.upcoming-tile')) {
          section.remove();
        }
      } catch (e) { /* ignore */ }

      // Tile 3: Academic quarters
      try {
        if (!academicTerms || !academicTerms.quarters || academicTerms.quarters.length === 0) {
          const tile3 = document.getElementById('upcomingTile3');
          if (tile3) tile3.remove();
        } else {
          // Also remove if no current or upcoming quarter
          const now = new Date();
          const hasCurrent = academicTerms.quarters.some(q => now >= q.start && now <= q.end);
          const hasNext = academicTerms.quarters.some(q => now < q.start);
          if (!hasCurrent && !hasNext) {
            const tile3 = document.getElementById('upcomingTile3');
            if (tile3) tile3.remove();
          }
        }
      } catch (e) { /* ignore */ }
      // Tile 1 (next period) intentionally removed from the homepage
    })();

    // Header greeting
    (function() {
      const hour = new Date().getHours();
      let greeting = 'Good morning';
      if (hour >= 12 && hour < 17) greeting = 'Good afternoon';
      else if (hour >= 17 && hour < 21) greeting = 'Good evening';
      else if (hour >= 21 || hour < 5) greeting = 'Good night';
      const name = getProfileName() || 'User';
      const greetingEl = document.getElementById('homeGreeting');
      if (greetingEl) {
        const firstNode = greetingEl.firstChild;
        if (firstNode) {
          console.log('Setting greeting text');
          firstNode.textContent = greeting + ', ';
        } else {
          console.log('Greeting element has no child, creating text node');
          greetingEl.insertBefore(document.createTextNode(greeting + ', '), greetingEl.firstChild);
        }
      }
      const nameEl = document.getElementById('homeGreetingName');
      if (nameEl) nameEl.textContent = name;
      const now = new Date();
      document.getElementById('homeDateDay').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
      document.getElementById('homeDateFull').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    })();

    // Upcoming tile 3 — Quarter countdown
    (function() {
      if (!academicTerms || !academicTerms.quarters) return;
      const now = new Date();
      const current = academicTerms.quarters.find(q => now >= q.start && now <= q.end);
      const next = academicTerms.quarters.find(q => now < q.start);
      const term = current || next;
      console.log('Quarter countdown: term', term);
      if (!term) {
        const titleEl = document.getElementById('upcomingTile3Title');
        if (titleEl) {
          console.log('No term found, setting title to No upcoming quarter');
          titleEl.textContent = 'No upcoming quarter';
        }
        return;
      }
      const label = current ? 'End of ' + term.name : 'Start of ' + term.name;
      const target = current ? term.end : term.start;
      const diffMs = target - now;
      const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
      const titleEl = document.getElementById('upcomingTile3Title');
      const subEl = document.getElementById('upcomingTile3Sub');
      if (titleEl) {
        console.log('Setting quarter title', label);
        titleEl.textContent = label;
      }
      if (subEl) {
        console.log('Setting quarter subtext', diffDays);
        subEl.textContent = diffDays + ' day' + (diffDays !== 1 ? 's' : '') + ' remaining';
      }
    })();

    // Upcoming tile 2 — Next followed event
    (async function() {
      try {
        const res = await fetch('/data/events.json');
        const data = await res.json();
        const all = [...(data.apTests || []), ...(data.standardizedTests || [])];
        const followed = getProfileFollowedEvents();
        const today = new Date(); today.setHours(0,0,0,0);
        const upcoming = all
          .filter(e => followed.includes(e.id))
          .map(e => ({ ...e, dateObj: new Date(e.date + 'T00:00:00') }))
          .filter(e => e.dateObj >= today)
          .sort((a,b) => a.dateObj - b.dateObj);
        if (!upcoming.length) {
          document.getElementById('upcomingTile2Title').textContent = 'No followed events';
          document.getElementById('upcomingTile2Sub').innerHTML = 'Add events in your <a href="/profile" style="color:var(--primary-light);">Profile</a>';
        } else {
          const next = upcoming[0];
          document.getElementById('upcomingTile2Title').textContent = next.title;
          document.getElementById('upcomingTile2Sub').textContent = next.dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + (next.time ? ' · ' + next.time : '');
        }
      } catch(e) {}
    })();

    // Next-period upcoming tile and its updater removed from the homepage

    updateClock();
    setInterval(updateClock, 1000);

    // Ticker
    try {
      const res = await fetch('/data/ticker-messages.json');
      const data = await res.json();
      const ticker = document.getElementById('homeTicker');
      const track = document.getElementById('homeTickerTrack');
      const closeBtn = document.getElementById('homeTickerClose');
      if (data.messages && data.messages.length && ticker && track) {
        const group = document.createElement('div');
        group.className = 'home-ticker-group';
        data.messages.forEach(msg => {
          const item = document.createElement('span');
          item.className = msg.url ? 'home-ticker-item home-ticker-item-with-link' : 'home-ticker-item';
          item.textContent = msg.text;
          if (msg.url) {
            const a = document.createElement('a');
            a.href = msg.url;
            a.className = 'home-ticker-link';
            a.target = '_blank';
            a.textContent = msg.url;
            item.appendChild(a);
          }
          group.appendChild(item);
          const sep = document.createElement('span');
          sep.className = 'home-ticker-separator';
          sep.textContent = '•';
          group.appendChild(sep);
        });
        track.appendChild(group.cloneNode(true));
        track.appendChild(group.cloneNode(true));
        let x = 0;
        const speed = 0.4;
        const halfWidth = track.scrollWidth / 2;
        let tickerPaused = false;
        function animateTicker() {
          if (!tickerPaused) {
            x -= speed;
            if (Math.abs(x) >= halfWidth) x = 0;
            track.style.transform = 'translateX(' + x + 'px)';
          }
          requestAnimationFrame(animateTicker);
        }
        requestAnimationFrame(animateTicker);
        const pauseBtn = document.getElementById('homeTickerPause');
        const pauseIcon = document.getElementById('homeTickerPauseIcon');
        const playIconSVG = '<polygon points="3,1 11,6 3,11" fill="white"/>';
        const pauseIconSVG = '<rect x="2" y="1" width="3" height="10" rx="1"/><rect x="7" y="1" width="3" height="10" rx="1"/>';
        if (pauseBtn) {
          pauseBtn.addEventListener('click', () => {
            tickerPaused = !tickerPaused;
            if (pauseIcon) pauseIcon.innerHTML = tickerPaused ? playIconSVG : pauseIconSVG;
            pauseBtn.setAttribute('aria-label', tickerPaused ? 'Play ticker' : 'Pause ticker');
          });
        }
        closeBtn && closeBtn.addEventListener('click', () => {
          ticker.classList.add('hidden');
          document.getElementById('homeTickerSpacer').style.display = 'none';
        });
      } else {
        ticker && ticker.classList.add('hidden');
      }
    } catch(e) {
      const ticker = document.getElementById('homeTicker');
      ticker && ticker.classList.add('hidden');
    }
    if (typeof window.hideLoader === 'function') window.hideLoader();
  })();
</script>
