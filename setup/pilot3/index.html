<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilot 3 Lunch Setup - LW Schedule</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  <div class="pageContainer">
    <h2>Pilot 3 Lunch Setup</h2>
    <p style="text-align: center; opacity: 0.8; margin-bottom: 30px;">Choose your lunch for Pilot 3 week (March 30-April 3, 2026)</p>

    <div class="lunchSelections">
      <div class="lunchDay">
        <label style="display: block; margin-bottom: 10px; font-weight: 700; text-align: center;">Monday Lunch</label>
        <div class="lunchButtons">
          <button class="lunchBtn selected" data-day="Monday" data-lunch="A">A Lunch<br><small>Based on Period 4</small></button>
          <button class="lunchBtn" data-day="Monday" data-lunch="B">B Lunch<br><small>Based on Period 4</small></button>
        </div>
      </div>

      <div class="lunchDay">
        <label style="display: block; margin-bottom: 10px; font-weight: 700; text-align: center;">Tuesday Lunch</label>
        <div class="lunchButtons">
          <button class="lunchBtn selected" data-day="Tuesday" data-lunch="A">A Lunch<br><small>Based on Period 4</small></button>
          <button class="lunchBtn" data-day="Tuesday" data-lunch="B">B Lunch<br><small>Based on Period 4</small></button>
        </div>
      </div>

      <div class="lunchDay">
        <label style="display: block; margin-bottom: 10px; font-weight: 700; text-align: center;">Wednesday Lunch</label>
        <div class="lunchButtons">
          <button class="lunchBtn selected" disabled>All School Lunch</button>
        </div>
      </div>

      <div class="lunchDay">
        <label style="display: block; margin-bottom: 10px; font-weight: 700; text-align: center;">Thursday Lunch</label>
        <div class="lunchButtons">
          <button class="lunchBtn selected" data-day="Thursday" data-lunch="A">A Lunch<br><small>Based on Period 3</small></button>
          <button class="lunchBtn" data-day="Thursday" data-lunch="B">B Lunch<br><small>Based on Period 3</small></button>
        </div>
      </div>

      <div class="lunchDay">
        <label style="display: block; margin-bottom: 10px; font-weight: 700; text-align: center;">Friday Lunch</label>
        <div class="lunchButtons">
          <button class="lunchBtn selected" data-day="Friday" data-lunch="A">A Lunch<br><small>Based on Period 4</small></button>
          <button class="lunchBtn" data-day="Friday" data-lunch="B">B Lunch<br><small>Based on Period 4</small></button>
        </div>
      </div>
    </div>

    <div class="settingsRow" style="margin-top: 40px;">
      <button class="mainBtn saveBtn" style="width: 100%;">Save & Continue</button>
    </div>
  </div>
  <script>
        
    let lunchPrefs = {
      Monday: 'A',
      Tuesday: 'A',
      Wednesday: 'All',
      Thursday: 'A',
      Friday: 'A'
    };

    const existing = localStorage.getItem('pilot3LunchPreferences');
    if (existing) {
      try {
        const prefs = JSON.parse(existing);
        if (typeof prefs === 'object' && prefs) {
          lunchPrefs = { ...lunchPrefs, ...prefs };
        }
      } catch (e) {
        console.error('Error loading pilot3 lunch preferences:', e);
      }
    }

    function updateLunchUI() {
      document.querySelectorAll('.lunchBtn[data-day]').forEach(btn => {
        const day = btn.dataset.day;
        const lunch = btn.dataset.lunch;
        btn.classList.toggle('selected', lunchPrefs[day] === lunch);
      });
    }

    document.querySelectorAll('.lunchBtn[data-day]').forEach(btn => {
      btn.addEventListener('click', () => {
        const day = btn.dataset.day;
        const lunch = btn.dataset.lunch;
        lunchPrefs[day] = lunch;
        updateLunchUI();
      });
    });

    document.querySelector('.saveBtn').addEventListener('click', () => {
      localStorage.setItem('pilot3LunchPreferences', JSON.stringify(lunchPrefs));
      window.location.href = '/';
    });

    updateLunchUI();
  </script>
  <style>
    .lunchSelections {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    .lunchDay {
      background: var(--card-dark);
      padding: 20px;
      border-radius: 12px;
      border: 2px solid transparent;
    }

    .lunchBtn {
      flex: 1;
      background: var(--card-dark);
      color: var(--text-light);
      border: 2px solid var(--primary-light);
      padding: 12px 24px;
      font-size: 1em;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 700;
      text-align: center;
    }

    .lunchBtn:hover {
      background: var(--primary-light);
      color: white;
      transform: scale(1.05);
    }

    .lunchBtn.selected {
      background: var(--primary-light);
      color: white;
      box-shadow: var(--glow);
    }

    .lunchBtn:disabled {
      opacity: 1;
      cursor: default;
      transform: none;
    }

    .lunchButtons {
      display: flex;
      gap: 15px;
      justify-content: center;
      max-width: 400px;
      margin: 0 auto;
    }

    @media (max-width: 600px) {
      .lunchButtons {
        flex-direction: column;
        gap: 10px;
      }

      .lunchBtn {
        padding: 10px 20px;
      }

      .lunchSelections {
        gap: 15px;
      }

      .lunchDay {
        padding: 15px;
      }
    }
  </style>
</body>
</html>
